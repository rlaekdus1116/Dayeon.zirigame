  {key:"gyeongnam",name:"경상남도",regions:[{name:"거창",x:494,y:774},{name:"합천",x:526,y:824},{name:"밀양",x:628,y:839},{name:"창녕",x:583,y:827},{name:"산청",x:494,y:865},{name:"함양",x:469,y:814},{name:"의령",x:554,y:859},{name:"양산",x:672,y:853},{name:"함안",x:571,y:894},{name:"김해",x:639,y:885},{name:"하동",x:474,y:921},{name:"진주",x:530,y:906},{name:"창원",x:601,y:913},{name:"사천",x:516,y:946},{name:"고성",x:556,y:950},{name:"통영",x:562,y:998},{name:"남해",x:504,y:1009},{name:"거제",x:607,y:986},{name:"울산",x:704,y:816},{name:"부산",x:684,y:903}]},
  {key:"jeonbuk",name:"전라북도",regions:[{name:"군산",x:308,y:736},{name:"익산",x:352,y:711},{name:"완주",x:390,y:720},{name:"무주",x:462,y:730},{name:"김제",x:334,y:767},{name:"전주",x:374,y:763},{name:"진안",x:421,y:749},{name:"부안",x:301,y:792},{name:"정읍",x:336,y:811},{name:"임실",x:390,y:815},{name:"장수",x:438,y:799},{name:"순창",x:374,y:864},{name:"고창",x:295,y:853},{name:"남원",x:418,y:856}]},
  {key:"jeonnam",name:"전라남도",regions:[{name:"영광",x:270,y:895},{name:"곡성",x:399,y:905},{name:"장성",x:317,y:887},{name:"담양",x:349,y:886},{name:"함평",x:277,y:930},{name:"구례",x:432,y:903},{name:"나주",x:311,y:959},{name:"화순",x:356,y:953},{name:"순천",x:414,y:958},{name:"무안",x:265,y:974},{name:"보성",x:379,y:1003},{name:"신안",x:210,y:998},{name:"목포",x:251,y:1004},{name:"영암",x:302,y:1004},{name:"장흥",x:340,y:1014},{name:"고흥",x:401,y:1055},{name:"광양",x:459,y:958},{name:"해남",x:287,y:1063},{name:"강진",x:319,y:1044},{name:"여수",x:457,y:1013},{name:"진도",x:234,y:1090},{name:"완도",x:322,y:1121},{name:"광주",x:327,y:920}]},
  {key:"jeju",name:"제주도",regions:[{name:"제주",x:271,y:1324},{name:"서귀포",x:299,y:1360}]}
];
const TOTAL_REGIONS=PROVINCES.reduce((a,p)=>a+p.regions.length,0);

const CHO=["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function choseong(s){return[...s].map(ch=>{const c=ch.charCodeAt(0)-0xac00;return(c<0||c>11171)?ch:CHO[Math.floor(c/588)];}).join(" ");}
function normalize(s){return s.trim().replace(/\s/g,"").replace(/(특별자치도|광역시|특별시|자치시|시|군|구)$/,"");}
const fbk=(p,n)=>`${p}__${n}`;
function fmtTime(ms){const s=Math.round(ms/1000);return`${Math.floor(s/60)}분 ${s%60}초`;}
function genCode(){return String(Math.floor(1000+Math.random()*9000));}
function getMyPid(){
  let id=sessionStorage.getItem('ziri_pid');
  if(!id){id='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);sessionStorage.setItem('ziri_pid',id);}
  return id;
}

function LandGrab(){
  const myPid=useMemo(()=>getMyPid(),[]);

  /* 공통 */
  const [phase,    setPhase]   = useState("home");
  const [error,    setError]   = useState("");
  const [bgmOn,    setBgmOn]   = useState(true);
  const [sel,      setSel]     = useState(null);
  const [selProv,  setSelProv] = useState(null);
  const [inputAns, setInput]   = useState("");
  const [mfb,      setMfb]     = useState(null);
  const [flash,    setFlash]   = useState(null);
  const inputRef=useRef(null);
  const actxRef =useRef(null);
  const bgmRef  =useRef(null);
  const bgmOnRef=useRef(true);
  const bgmStepRef=useRef(0);
  const bgmNextRef=useRef(0);
  useEffect(()=>{bgmOnRef.current=bgmOn;},[bgmOn]);

  /* 팀전 */
  const [roomCode,  setRoomCode]  = useState("");
  const [inputCode, setInputCode] = useState("");
  const [myName,    setMyName]    = useState(sessionStorage.getItem('ziri_name')||"");
  const [myTeamIdx, setMyTeamIdx] = useState(null);
  const [isHost,    setIsHost]    = useState(false);
  const [teamCount, setTeamCount] = useState(2);
  const [teamNames, setTeamNames] = useState([...TEAM_NAMES]);
  const [roomData,  setRoomData]  = useState(null);

  /* 1인용 */
  const [soloType,   setSoloType]   = useState("practice");
  const [soloMap,    setSoloMap]    = useState("nation");
  const [soloOwners, setSoloOwners] = useState({});
  const [soloWrong,  setSoloWrong]  = useState(0);
  const [soloStart,  setSoloStart]  = useState(null);
  const [soloEnd,    setSoloEnd]    = useState(null);
  const [soloFailed, setSoloFailed] = useState(false);
  const [soloNow,    setSoloNow]    = useState(null);
  const timerRef=useRef(null);

  /* Firebase */
  useEffect(()=>{
    if(!roomCode)return;
    const ref=db.ref(`rooms/${roomCode}`);
    ref.on('value',snap=>setRoomData(snap.val()));
    return()=>ref.off();
  },[roomCode]);

  const game   =roomData?.game   ||{};
  const players=roomData?.players||{};
  const owners =roomData?.owners ||{};
  const teams  =game.teams||TEAM_NAMES.slice(0,2).map((n,i)=>({name:n,color:TEAM_COLORS[i]}));
  const scores =useMemo(()=>{
    const s=Array(teams.length).fill(0);
    Object.values(owners).forEach(ti=>{if(typeof ti==="number"&&ti>=0&&ti<s.length)s[ti]++;});
    return s;
  },[owners,teams]);

  /* 팀전 파생 */
  const prov=useMemo(()=>{
    if(!game.started||game.mode==="nation")return null;
    const order=game.order||[];
    if(!order.length)return null;
    return PROVINCES[order[game.provIdx||0]]||null;
  },[game.started,game.mode,game.order,game.provIdx]);
  const provOwned =prov?prov.regions.filter(r=>owners[fbk(prov.key,r.name)]!==undefined).length:0;
  const provTotal =prov?prov.regions.length:0;
  const totalOwned=Object.keys(owners).length;

  /* 상태 전환 */
  useEffect(()=>{
    if(!roomData)return;
    const g=roomData.game||{};
    if(phase==="waiting"&&g.started)                       {setPhase("game");startBgm();}
    if(phase==="game"   &&g.cleared)                       {setPhase("result");stopBgm();fanfare();}
    if(phase==="result" &&g.started&&!g.cleared)           {setPhase("game");startBgm();setSel(null);setMfb(null);}
    if((phase==="game"||phase==="result")&&!g.started)     {setPhase("waiting");setSel(null);stopBgm();}
  },[roomData]);

  /* viewBox */
  const zoomProv=useMemo(()=>{
    if(phase==="solo_game") return soloMap==="nation"?null:PROVINCES.find(p=>p.key===soloMap)||null;
    if(!game.mode||game.mode==="nation") return null;
    if(game.mode==="all") return prov||null;
    return PROVINCES.find(p=>p.key===game.mode)||null;
  },[phase,soloMap,game.mode,prov]);

  const viewBox=useMemo(()=>{
    if(!zoomProv)return`0 0 ${MAP_W} ${MAP_H}`;
    const xs=zoomProv.regions.map(r=>r.x),ys=zoomProv.regions.map(r=>r.y);
    let x0=Math.min(...xs),x1=Math.max(...xs),y0=Math.min(...ys),y1=Math.max(...ys);
    const px=(x1-x0)*0.18+50,py=(y1-y0)*0.18+50;
    x0-=px;x1+=px;y0-=py;y1+=py;
    let w=x1-x0,h=y1-y0;
    if(w>h){const d=(w-h)/2;y0-=d;h=w;}else{const d=(h-w)/2;x0-=d;w=h;}
    return`${x0} ${y0} ${w} ${h}`;
  },[zoomProv]);

  const isNation=!zoomProv&&(phase==="solo_game"?soloMap==="nation":game.mode==="nation"||!game.mode);
  const vbW=parseFloat(viewBox.split(" ")[2]);
  const sz =isNation?9:Math.max(13,Math.min(24,Math.round(40*(vbW/MAP_W))));
  const pillW=sz*1.9,pillH=sz*1.3;

  /* ── 사운드 ── */
  function getAC(){
    if(!actxRef.current)actxRef.current=new(window.AudioContext||window.webkitAudioContext)();
    const ac=actxRef.current;if(ac.state==="suspended")ac.resume();return ac;
  }
  function sound(ok){try{
    const ac=getAC(),t=ac.currentTime;
    if(ok){[523,659,784].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type="triangle";o.frequency.value=f;o.connect(g);g.connect(ac.destination);const s=t+i*0.085;g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(0.5,s+0.02);g.gain.exponentialRampToValueAtTime(0.0001,s+0.26);o.start(s);o.stop(s+0.28);});}
    else{const o=ac.createOscillator(),g=ac.createGain();o.type="sawtooth";o.frequency.value=140;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.3,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.28);o.start(t);o.stop(t+0.3);}
  }catch(e){}}

  function fanfare(){try{
    const ac=getAC();
    [[523,.12],[659,.12],[784,.12],[1047,.18],[880,.12],[988,.12],[1047,.25]].forEach(([f,dur],i)=>{
      let t=ac.currentTime;
      const off=[0,.13,.26,.39,.6,.73,.86];
      const o=ac.createOscillator(),g=ac.createGain();
      o.type="square";o.frequency.value=f;o.connect(g);g.connect(ac.destination);
      const s=t+off[i];
      g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(0.25,s+0.02);g.gain.exponentialRampToValueAtTime(0.0001,s+dur);
      o.start(s);o.stop(s+dur+0.02);
    });
  }catch(e){}}

  const MELODY=[523,659,784,659,587,784,988,784,659,784,1047,784,587,659,784,880];
  const BASS  =[131,0,196,0,165,0,196,0,131,0,196,0,165,0,98,0];
  const STEP_DUR=0.175;
  function scheduleBgm(){
    const ac=actxRef.current;if(!ac)return;
    const ahead=0.5;
    while(bgmNextRef.current<ac.currentTime+ahead){
      if(bgmOnRef.current){
        const i=bgmStepRef.current%MELODY.length;
        const m=MELODY[i],b=BASS[i],t=bgmNextRef.current;
        if(m){const o=ac.createOscillator(),g=ac.createGain();o.type="square";o.frequency.value=m;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.05,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);o.start(t);o.stop(t+0.16);}
        if(b){const o=ac.createOscillator(),g=ac.createGain();o.type="triangle";o.frequency.value=b;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.07,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);o.start(t);o.stop(t+0.22);}
      }
      bgmNextRef.current+=STEP_DUR;
      bgmStepRef.current++;
    }
  }
  function startBgm(){try{
    const ac=getAC();if(bgmRef.current)return;
    bgmStepRef.current=0;bgmNextRef.current=ac.currentTime+0.1;
    scheduleBgm();bgmRef.current=setInterval(scheduleBgm,100);
  }catch(e){}}
  function stopBgm(){if(bgmRef.current){clearInterval(bgmRef.current);bgmRef.current=null;}}

  /* ── 1인용 ── */
  function soloStartGame(){
    setSoloOwners({});setSoloWrong(0);setSoloFailed(false);
    const now=Date.now();setSoloStart(now);setSoloEnd(null);setSoloNow(now);
    setSel(null);setSelProv(null);setInput("");setMfb(null);
    setPhase("solo_game");startBgm();
    timerRef.current=setInterval(()=>setSoloNow(Date.now()),1000);
  }
  function soloFinish(failed=false){
    setSoloEnd(Date.now());setSoloFailed(failed);
    clearInterval(timerRef.current);
    setSel(null);setSelProv(null);setMfb(null);
    setPhase("solo_result");stopBgm();
    if(!failed)fanfare();
  }
  function soloBack(){
    clearInterval(timerRef.current);stopBgm();
    setSel(null);setSelProv(null);setMfb(null);setPhase("solo_setup");
  }
  function soloPickRegion(pk,name){
    if(soloOwners[fbk(pk,name)])return;
    setSel(name);setSelProv(pk);setInput("");setMfb(null);
  }
  function soloSubmit(){
    if(!sel)return;
    if(normalize(inputAns)===normalize(sel)){
      sound(true);
      const key=fbk(selProv,sel);
      const newOwners={...soloOwners,[key]:true};
      setSoloOwners(newOwners);
      setFlash({name:sel,provKey:selProv});setTimeout(()=>setFlash(null),700);
      const owned=Object.keys(newOwners).length;
      let done=false;
      if(soloMap==="nation"&&owned>=TOTAL_REGIONS)done=true;
      else if(soloMap!=="nation"){const pd=PROVINCES.find(p=>p.key===soloMap);if(owned>=pd.regions.length)done=true;}
      setSel(null);setSelProv(null);setInput("");setMfb(null);
      if(done)soloFinish(false);
    } else {
      sound(false);
      const newW=soloWrong+1;setSoloWrong(newW);
      if(soloType==="exam"){
        const mine=Object.keys(soloOwners);
        let lostName=null,lostPK=null;
        if(mine.length){
          const lk=mine[Math.floor(Math.random()*mine.length)];
          const nO={...soloOwners};delete nO[lk];setSoloOwners(nO);
          const pts=lk.split('__');lostPK=pts[0];lostName=pts[1];
          setFlash({name:lostName,provKey:lostPK,lost:true});setTimeout(()=>setFlash(null),900);
        }
        if(newW>=EXAM_FAIL){soloFinish(true);return;}
        setMfb({msg:`땡! (${newW}/${EXAM_FAIL}회 오답)${lostName?` "${lostName}" 땅 잃었어요!`:""}`});
      } else {
        setMfb({msg:"땡! 다시 도전해봐요 🔄"});
      }
    }
  }

  /* ── 팀전 ── */
  async function createRoom(){
    if(!myName.trim()){setError("이름을 입력해주세요");return;}
    sessionStorage.setItem('ziri_name',myName);
    const code=genCode();
    const bt=Array.from({length:teamCount},(_,i)=>({name:teamNames[i]||TEAM_NAMES[i],color:TEAM_COLORS[i]}));
    await db.ref(`rooms/${code}`).set({
      game:{mode:"nation",started:false,provIdx:0,order:[],cleared:false,hostId:myPid,teams:bt},
      players:{[myPid]:{name:myName.trim(),teamIdx:0,joinedAt:Date.now()}}
    });
    db.ref(`rooms/${code}/players/${myPid}`).onDisconnect().remove();
    setMyTeamIdx(0);setRoomCode(code);setIsHost(true);setPhase("waiting");setError("");
  }

  async function joinRoom(){
    const code=inputCode.trim();
    if(!code||code.length<4){setError("방 코드를 입력해주세요");return;}
    if(!myName.trim()){setError("이름을 입력해주세요");return;}
    const snap=await db.ref(`rooms/${code}`).get();
    if(!snap.exists()){setError("존재하지 않는 방 코드예요");return;}
    sessionStorage.setItem('ziri_name',myName);
    const rData=snap.val();
    const existing=rData?.players?.[myPid];
    const ti=existing?.teamIdx??0;
    await db.ref(`rooms/${code}/players/${myPid}`).set({name:myName.trim(),teamIdx:ti,joinedAt:Date.now()});
    db.ref(`rooms/${code}/players/${myPid}`).onDisconnect().remove();
    setMyTeamIdx(ti);setRoomCode(code);setIsHost(false);
    if(rData?.game?.started){setPhase("game");startBgm();}
    else setPhase("waiting");
    setError("");
  }

  async function changeTeam(ti){
    setMyTeamIdx(ti);
    await db.ref(`rooms/${roomCode}/players/${myPid}/teamIdx`).set(ti);
  }
  async function startGame(){
    if(!isHost)return;
    const mode=game.mode||"nation";
    let order=[];
    if(mode==="all")order=PROVINCES.map((_,i)=>i);
    else if(mode!=="nation")order=[PROVINCES.findIndex(p=>p.key===mode)];
    await db.ref(`rooms/${roomCode}/owners`).remove();
    await db.ref(`rooms/${roomCode}/wrongCounts`).remove(); // 게임 시작 시 오답 카운트 초기화
    await db.ref(`rooms/${roomCode}/game`).update({started:true,order,provIdx:0,cleared:false});
  }
  async function setGameMode(m){if(!isHost)return;await db.ref(`rooms/${roomCode}/game/mode`).set(m);}
  function leaveRoom(){
    db.ref(`rooms/${roomCode}/players/${myPid}`).remove();
    setPhase("home");setRoomCode("");setRoomData(null);setIsHost(false);stopBgm();setSel(null);setMyTeamIdx(null);
  }
  async function resetToLobby(){
    if(!isHost)return;
    await db.ref(`rooms/${roomCode}/owners`).remove();
    await db.ref(`rooms/${roomCode}/wrongCounts`).remove(); // 오답 카운트 초기화
    await db.ref(`rooms/${roomCode}/game`).update({started:false,cleared:false,provIdx:0});
  }
  function pick(pk,name){
    if(myTeamIdx===null)return;
    const myWrong=roomData?.wrongCounts?.[myPid]||0;
    if(myWrong>=TEAM_WRONG_LIMIT)return; // 오답 한도 초과 → 잠금
    if(owners[fbk(pk,name)]!==undefined)return;
    setSel(name);setSelProv(pk);setInput("");setMfb(null);
  }
  async function submit(){
    if(!sel||myTeamIdx===null)return;
    if(normalize(inputAns)===normalize(sel)){
      const key=fbk(selProv,sel);
      const ref=db.ref(`rooms/${roomCode}/owners/${key}`);
      const res=await ref.transaction(cur=>cur!=null?undefined:myTeamIdx);
      if(res.committed){
        sound(true);setFlash({name:sel,provKey:selProv,ti:myTeamIdx});setTimeout(()=>setFlash(null),700);
        const newTotal=Object.keys(owners).length+1;
        if(game.mode==="nation"&&newTotal>=TOTAL_REGIONS){await db.ref(`rooms/${roomCode}/game`).update({cleared:"END"});}
        else if(prov){
          const np=prov.regions.filter(r=>owners[fbk(prov.key,r.name)]!==undefined||(r.name===sel&&selProv===prov.key)).length;
          if(np>=provTotal)await db.ref(`rooms/${roomCode}/game`).update({cleared:true});
        }
      } else {
        sound(false);setMfb({msg:"아깝! 다른 팀이 먼저 차지했어요!"});return;
      }
      setSel(null);setSelProv(null);setInput("");setMfb(null);
    } else {
      sound(false);
      // 오답 카운트 Firebase에 증가
      const wrongSnap=await db.ref(`rooms/${roomCode}/wrongCounts/${myPid}`).get();
      const newWrong=(wrongSnap.val()||0)+1;
      await db.ref(`rooms/${roomCode}/wrongCounts/${myPid}`).set(newWrong);
      const mine=Object.keys(owners).filter(k=>owners[k]===myTeamIdx);
      let lostKey=null;
      if(mine.length){lostKey=mine[Math.floor(Math.random()*mine.length)];await db.ref(`rooms/${roomCode}/owners/${lostKey}`).remove();}
      const pts=lostKey?.split('__');const ln=pts?.[1]||null,lp=pts?.[0]||null;
      const lockMsg=newWrong>=TEAM_WRONG_LIMIT?` (오답 ${TEAM_WRONG_LIMIT}회 초과 → 참여 잠금 🔒)`:"";
      setMfb({msg:(ln?`땡! "${ln}" 땅을 잃었어요!`:"땡! 다시 도전!")+lockMsg});
      if(ln){setFlash({name:ln,provKey:lp,ti:myTeamIdx,lost:true});setTimeout(()=>setFlash(null),900);}
      if(newWrong>=TEAM_WRONG_LIMIT){setTimeout(()=>{setSel(null);setSelProv(null);setMfb(null);},1500);}
    }
  }
  async function nextProv(){
    if(!isHost)return;
    const ni=(game.provIdx||0)+1;
    if(ni>=(game.order||[]).length)await db.ref(`rooms/${roomCode}/game`).update({cleared:"END"});
    else{
      await db.ref(`rooms/${roomCode}/owners`).remove();
      await db.ref(`rooms/${roomCode}/game`).update({cleared:false,provIdx:ni});
    }
  }

  /* ── 지역 렌더 공용 ── */
  function makeRegionEl(pk,r,owned,color,onCk){
    const key=fbk(pk,r.name);
    const isF=flash&&flash.name===r.name&&flash.provKey===pk;
    const isSel=sel===r.name&&selProv===pk;
    return(
      <g key={key} onClick={onCk} style={{cursor:owned?"default":"pointer"}}>
        {owned&&<circle cx={r.x} cy={r.y} r={isF?sz*1.7:sz*1.25} fill={color} opacity={isF?0.8:0.45} style={{transition:"all .3s"}}/>}
        {isF&&flash.lost&&<circle cx={r.x} cy={r.y} r={sz*1.5} fill="none" stroke="#dc2626" strokeWidth={sz*0.18}/>}
        <rect x={r.x-pillW/2} y={r.y-pillH/2} width={pillW} height={pillH} rx={pillH/2}
          fill={owned?color:"#fff"} stroke={isSel?"#0f172a":(owned?color:"#cbd5e1")}
          strokeWidth={isSel?sz*0.22:sz*0.13} opacity={owned?1:0.95}/>
        <text x={r.x} y={r.y+sz*0.34} textAnchor="middle" fontSize={owned?sz*0.82:sz} fontWeight="700"
          fill={owned?"#fff":"#475569"} style={{fontFamily:"'Jua',sans-serif",letterSpacing:owned?0:1}}>
          {owned?r.name:choseong(r.name)}
        </text>
      </g>
    );
  }
  const renderTeam=(pk,r)=>{
    const ti=owners[fbk(pk,r.name)];const owned=ti!==undefined;
    return makeRegionEl(pk,r,owned,owned?(teams[ti]?.color||"#94a3b8"):"#cbd5e1",()=>pick(pk,r.name));
  };
  const renderSolo=(pk,r)=>{
    const owned=!!soloOwners[fbk(pk,r.name)];
    const color=soloType==="exam"?EXAM_CLR:SOLO_CLR;
    return makeRegionEl(pk,r,owned,color,()=>soloPickRegion(pk,r.name));
  };

  /* ── 지도 공용 컴포넌트 ── */
  const MapBox=({children,accent})=>(
    <div style={{position:"relative",width:"100%",maxWidth:isNation?460:560,margin:"0 auto",
      aspectRatio:isNation?`${MAP_W}/${MAP_H}`:"1/1",
      borderRadius:16,overflow:"hidden",background:"#fff",
      border:`2px solid ${accent||"#e2e8f0"}44`,boxShadow:"0 8px 24px -8px rgba(0,0,0,.2)"}}>
      <svg viewBox={viewBox} preserveAspectRatio="xMidYMid meet"
        style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
        <image href={MAP_BG} xlinkHref={MAP_BG} x="0" y="0" width={MAP_W} height={MAP_H} preserveAspectRatio="none"/>
        {children}
      </svg>
    </div>
  );

  /* ── 답변 모달 ── */
  const AnswerModal=({onSubmit,onClose,accent,extraInfo})=>(
    <div style={S.overlay} onClick={onClose}>
      <div style={S.modal} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>
          {phase==="solo_game"&&isNation?`${PROVINCES.find(p=>p.key===selProv)?.name} · `:""}이 땅은?
        </div>
        <div style={{fontSize:44,fontWeight:900,letterSpacing:8,background:"#f8fafc",borderRadius:14,padding:"10px 0",margin:"0 0 10px"}}>
          {choseong(sel||"")}
        </div>
        {extraInfo}
        <input ref={inputRef} autoFocus value={inputAns}
          placeholder="지역 이름 입력 (예: 대전)"
          onKeyDown={e=>{if(e.key==="Enter")onSubmit();}}
          onChange={e=>{setInput(e.target.value);setMfb(null);}}
          style={{fontFamily:"'Jua',sans-serif",fontSize:20,padding:"11px 14px",borderRadius:13,border:"2px solid #e2e8f0",width:"100%",textAlign:"center",outline:"none",marginBottom:4}}/>
        {mfb&&<div style={{fontSize:13,fontWeight:700,color:"#dc2626",marginBottom:6}}>{mfb.msg}</div>}
        <button onClick={onSubmit}
          style={{fontFamily:"'Jua',sans-serif",marginTop:8,width:"100%",fontSize:17,padding:13,borderRadius:13,border:"none",background:accent||"#0f172a",color:"#fff",fontWeight:700,cursor:"pointer",boxShadow:"0 4px 0 rgba(0,0,0,.18)"}}>
          정답 제출 🚩
        </button>
        <button onClick={onClose}
          style={{fontFamily:"'Jua',sans-serif",marginTop:8,width:"100%",fontSize:14,padding:"9px",borderRadius:11,border:"2px solid #e2e8f0",background:"#fff",color:"#64748b",cursor:"pointer"}}>
          닫기
        </button>
      </div>
    </div>
  );

  /* ══════════════════════════════

  ══════════════════════════════ */

  if(phase==="home") return(
    <div style={S.page}><div style={S.card}>
      <div style={{fontSize:52}}>🗺️</div>
      <h1 style={S.h1}>우리나라 땅따먹기</h1>
      <p style={S.sub}>초성 보고 지역 이름 맞추기!</p>
      <div style={{borderBottom:"2px solid #f1f5f9",margin:"16px 0 14px",paddingBottom:14}}>
        <div style={S.sectionLabel}>👥 팀 대결</div>
        <button onClick={()=>setPhase("creating")} style={{...S.btn,background:"#0f172a",color:"#fff",marginBottom:8}}>🏠 방 만들기 (선생님)</button>
        <button onClick={()=>setPhase("joining")}  style={{...S.btn,background:"#3b82f6",color:"#fff"}}>🚪 방 참여하기 (학생)</button>
      </div>
      <div>
        <div style={S.sectionLabel}>🧑 1인용</div>

        <button onClick={()=>{setSoloType("practice");setPhase("solo_setup");}} style={{...S.btn,background:SOLO_CLR,color:"#fff"}}>🎮 혼자 연습</button>

  if(phase==="creating") return(

        ))}

          <input value={teamNames[i]} onChange={e=>{const v=e.target.value;setTeamNames(ns=>ns.map((x,k)=>k===i?v:x));}}

      <button onClick={createRoom} style={{...S.btn,background:"#0f172a",color:"#fff",marginTop:18}}>방 만들기 →</button>
      <button onClick={()=>{setPhase("home");setError("");}} style={{...S.ghost,marginTop:10,width:"100%"}}>← 돌아가기</button>
    </div></div>
  );

  if(phase==="joining") return(
    <div style={S.page}><div style={S.card}>
      <h2 style={S.h2}>🚪 방 참여하기</h2>
      <div style={S.lbl}>방 코드 (숫자 4자리)</div>
      <input value={inputCode} onChange={e=>setInputCode(e.target.value.replace(/\D/g,""))}
        placeholder="1234" inputMode="numeric" pattern="[0-9]*"
        style={{...S.inp,textAlign:"center",fontSize:32,letterSpacing:8,fontWeight:900}} maxLength={4}/>
      <div style={{...S.lbl,marginTop:14}}>내 이름</div>
      <input value={myName} onChange={e=>setMyName(e.target.value)} placeholder="이름 입력" style={S.inp} maxLength={8}/>
      {error&&<div style={S.err}>{error}</div>}
      <button onClick={joinRoom} style={{...S.btn,background:"#3b82f6",color:"#fff",marginTop:18}}>참여하기 →</button>
      <button onClick={()=>{setPhase("home");setError("");}} style={{...S.ghost,marginTop:10,width:"100%"}}>← 돌아가기</button>
    </div></div>
  );

  if(phase==="waiting"){
    const pl=Object.entries(players).sort((a,b)=>a[1].joinedAt-b[1].joinedAt);
    const curTi=players[myPid]?.teamIdx??myTeamIdx??0;
    return(
      <div style={S.page}><div style={S.card}>
        <div style={{fontSize:30}}>{isHost?"🏠 방장":"⏳ 대기 중"}</div>
        <div style={{fontSize:11,color:"#94a3b8",margin:"4px 0 2px"}}>이 코드를 칠판에 적어주세요</div>
        <div style={{fontSize:44,fontWeight:900,letterSpacing:10,background:"#f1f5f9",borderRadius:14,padding:"12px 20px",margin:"8px 0",color:"#0f172a"}}>{roomCode}</div>
        <div style={S.lbl}>내 팀 선택</div>
        <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:12}}>
          {teams.map((t,i)=>(
            <button key={i} onClick={()=>changeTeam(i)}
              style={{fontFamily:"'Jua',sans-serif",padding:"10px 18px",borderRadius:12,border:`3px solid ${t.color}`,
                background:curTi===i?t.color:"#fff",color:curTi===i?"#fff":t.color,fontWeight:700,fontSize:15,cursor:"pointer"}}>
              {t.name}
            </button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",marginBottom:14}}>
          {teams.map((t,i)=>{
            const m=pl.filter(([,p])=>p.teamIdx===i);
            return(
              <div key={i} style={{flex:"1 1 110px",minWidth:90,background:t.color+"18",border:`2px solid ${t.color}44`,borderRadius:12,padding:"8px 10px"}}>
                <div style={{fontWeight:800,color:t.color,fontSize:13,marginBottom:3}}>{t.name} ({m.length}명)</div>
                {m.map(([pid,p])=>(
                  <div key={pid} style={{fontSize:12,color:"#475569"}}>{p.name}{pid===myPid?" 👈":""}{pid===game.hostId?" 👑":""}</div>
                ))}
              </div>

          })}
        </div>
        {isHost&&(<>
          <div style={S.lbl}>게임 모드</div>
          <button onClick={()=>setGameMode("nation")} style={{...S.modeBtn,...(game.mode==="nation"?S.modeBtnOn:{})}}>🇰🇷 전국 한방</button>
          <button onClick={()=>setGameMode("all")}    style={{...S.modeBtn,...(game.mode==="all"?S.modeBtnOn:{}),marginTop:4}}>🔄 전국 순회 (도별 차례로)</button>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",marginTop:5}}>
            {PROVINCES.map(p=><button key={p.key} onClick={()=>setGameMode(p.key)}
              style={{...S.modeSmall,...(game.mode===p.key?S.modeBtnOn:{})}}>{p.name}</button>)}
          </div>
          <button onClick={startGame} style={{...S.btn,background:"#22c55e",color:"#fff",fontSize:18,marginTop:14}}>🎮 게임 시작!</button>

        {!isHost&&<div style={{color:"#64748b",fontSize:13,padding:"10px",background:"#f8fafc",borderRadius:11,border:"2px solid #e2e8f0"}}>방장이 게임을 시작할 때까지 기다려요 ⏳</div>}
        <button onClick={leaveRoom} style={{...S.ghost,marginTop:10,width:"100%"}}>← 나가기</button>
      </div></div>
    );
  }

  if(phase==="result"){
    const isEnd=game.cleared==="END";
    const medal=["🥇","🥈","🥉"];
    const sorted=teams.map((t,i)=>({t,i,score:scores[i]||0})).sort((a,b)=>b.score-a.score);
    const nextIdx=(game.provIdx||0)+1;
    const nextProvName=game.order&&nextIdx<(game.order||[]).length?PROVINCES[game.order[nextIdx]]?.name:null;
    return(
      <div style={S.page}><div style={S.card}>
        <div style={{fontSize:48}}>{isEnd?"🏆":"🎉"}</div>
        <h2 style={{margin:"4px 0 4px",fontSize:20}}>{isEnd?"최종 결과!":(prov?.name?`${prov.name} 완료!`:"라운드 완료!")}</h2>
        {/* 방 코드 표시 (재입장용) */}
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:10}}>방 코드: <b style={{color:"#0f172a",letterSpacing:4}}>{roomCode}</b> (재입장 가능)</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {sorted.map(({t,i,score},rank)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",background:t.color+"22",borderRadius:12,border:`2px solid ${t.color}44`,outline:i===myTeamIdx?`3px solid ${t.color}`:"none"}}>
              <span style={{fontWeight:800,color:t.color}}>{medal[rank]||""} {t.name}{i===myTeamIdx?" (내 팀)":""}</span>

          ))}
        </div>
        {isHost&&!isEnd&&game.mode==="all"&&(
          <button onClick={nextProv}
            style={{...S.btn,background:"#0f172a",color:"#fff",fontSize:17,marginBottom:8}}>
            {nextProvName?`▶ 다음: ${nextProvName}`:  "▶ 다음 지역으로"}
          </button>
        )}
        {isHost&&<button onClick={resetToLobby} style={{...S.btn,background:"#6366f1",color:"#fff",marginBottom:6}}>🔄 다시 하기</button>}
        {!isHost&&!isEnd&&<div style={{color:"#64748b",fontSize:13,padding:"10px",background:"#f8fafc",borderRadius:11,border:"2px solid #e2e8f0",marginBottom:8}}>방장이 다음 지역을 선택 중이에요 ⏳</div>}
        <button onClick={leaveRoom} style={{...S.ghost,width:"100%"}}>← 나가기</button>
      </div></div>
    );
  }

  if(phase==="solo_setup"){
    const isExam=soloType==="exam";
    const accent=isExam?EXAM_CLR:SOLO_CLR;
    const soloProv=soloMap!=="nation"?PROVINCES.find(p=>p.key===soloMap):null;
    const cnt=soloProv?soloProv.regions.length:TOTAL_REGIONS;
    return(
      <div style={S.page}><div style={S.card}>
        <div style={{fontSize:44}}>{isExam?"📝":"🎮"}</div>
        <h2 style={{...S.h2,color:accent}}>{isExam?"시험 모드":"혼자 연습"}</h2>
        {isExam?(
          <div style={{fontSize:12,color:"#dc2626",background:"#fef2f2",borderRadius:10,padding:"8px 12px",marginBottom:12,border:"1px solid #fecaca"}}>
            ⚠️ 오답 {EXAM_FAIL}회 이상 → 불합격!<br/>틀릴 때마다 내 땅 하나가 사라져요
          </div>
        ):(
          <div style={{fontSize:12,color:SOLO_CLR,background:"#ecfeff",borderRadius:10,padding:"8px 12px",marginBottom:12,border:"1px solid #a5f3fc"}}>
            💡 틀려도 패널티 없음 — 편하게 연습!
          </div>
        )}
        <div style={S.lbl}>범위 선택 <span style={{color:accent}}>({cnt}개 지역)</span></div>
        <button onClick={()=>setSoloMap("nation")}
          style={{...S.modeBtn,...(soloMap==="nation"?{...S.modeBtnOn,borderColor:accent,background:accent}:{})}}>
          🇰🇷 전국 전체 ({TOTAL_REGIONS}개)
        </button>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",marginTop:6}}>
          {PROVINCES.map(p=>(
            <button key={p.key} onClick={()=>setSoloMap(p.key)}
              style={{...S.modeSmall,...(soloMap===p.key?{...S.modeBtnOn,borderColor:accent,background:accent}:{})}}>
              {p.name}({p.regions.length})
            </button>
          ))}
        </div>
        <button onClick={soloStartGame}
          style={{...S.btn,background:accent,color:"#fff",fontSize:18,marginTop:18}}>
          {isExam?"📝 시험 시작!":"🎮 연습 시작!"}
        </button>
        <button onClick={()=>setPhase("home")} style={{...S.ghost,marginTop:10,width:"100%"}}>← 돌아가기</button>
      </div></div>
    );
  }

  if(phase==="solo_result"){
    const isExam=soloType==="exam";
    const accent=isExam?EXAM_CLR:SOLO_CLR;
    const elapsed=(soloEnd||Date.now())-(soloStart||Date.now());
    const correct=Object.keys(soloOwners).length;
    const total=(soloMap==="nation"?TOTAL_REGIONS:(PROVINCES.find(p=>p.key===soloMap)?.regions.length||0));
    const pass=!soloFailed&&soloWrong<EXAM_FAIL;
    return(
      <div style={S.page}><div style={S.card}>
        <div style={{fontSize:56}}>{isExam?(pass?"🎉":"😢"):"🏅"}</div>
        {isExam&&<div style={{fontSize:24,fontWeight:900,color:pass?"#22c55e":"#ef4444",margin:"4px 0 12px"}}>{pass?"합격!":"불합격"}</div>}
        {!isExam&&<div style={{fontSize:22,fontWeight:900,margin:"4px 0 12px"}}>연습 완료!</div>}
        <div style={{background:"#f8fafc",borderRadius:14,padding:"14px",marginBottom:14,border:"2px solid #e2e8f0",textAlign:"left"}}>
          <div style={S.scoreRow}>
            <span style={{color:"#64748b"}}>⏱ 소요 시간</span><b>{fmtTime(elapsed)}</b>
          </div>
          <div style={{...S.scoreRow,borderTop:"1px solid #e2e8f0"}}>
            <span style={{color:"#64748b"}}>✅ 정답 (차지한 땅)</span>
            <b style={{color:"#22c55e"}}>{correct}/{total}개</b>
          </div>
          <div style={{...S.scoreRow,borderTop:"1px solid #e2e8f0",borderBottom:isExam?"1px solid #e2e8f0":"none"}}>
            <span style={{color:"#64748b"}}>❌ 오답 횟수</span>
            <b style={{color:soloWrong>0?"#ef4444":"#22c55e"}}>{soloWrong}회</b>
          </div>
          {isExam&&(
            <div style={{...S.scoreRow,borderTop:"none"}}>
              <span style={{color:"#64748b"}}>🚨 오답 한도</span>
              <b style={{color:soloWrong>=EXAM_FAIL?"#ef4444":"#64748b"}}>{soloWrong}/{EXAM_FAIL}회</b>
            </div>
          )}
        </div>
        <div style={{height:12,borderRadius:6,background:"#e2e8f0",overflow:"hidden",marginBottom:6}}>
          <div style={{height:"100%",borderRadius:6,background:accent,width:`${Math.min(100,Math.round(correct/total*100))}%`,transition:"width 1s"}}/>
        </div>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>{Math.round(correct/total*100)}% 정복</div>
        <button onClick={soloStartGame} style={{...S.btn,background:accent,color:"#fff",marginBottom:8}}>🔄 다시 시작</button>
        <button onClick={()=>setPhase("solo_setup")} style={{...S.ghost,width:"100%",marginBottom:6}}>⚙️ 설정 변경</button>
        <button onClick={()=>setPhase("home")}        style={{...S.ghost,width:"100%"}}>🏠 홈으로</button>
      </div></div>
    );
  }

  /* ── 1인용 게임 ── */
  if(phase==="solo_game"){
    const isExam=soloType==="exam";
    const accent=isExam?EXAM_CLR:SOLO_CLR;
    const soloProv=soloMap!=="nation"?PROVINCES.find(p=>p.key===soloMap):null;
    const total=soloProv?soloProv.regions.length:TOTAL_REGIONS;
    const correct=Object.keys(soloOwners).length;
    const elapsed=soloNow&&soloStart?soloNow-soloStart:0;
    const close=()=>{setSel(null);setSelProv(null);setMfb(null);};
    return(
      <div style={S.page}>
        <div style={{maxWidth:720,margin:"0 auto 6px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6,marginBottom:6,padding:"0 2px"}}>
            <span style={{fontSize:14,fontWeight:700,color:accent}}>{isExam?"📝 시험":"🎮 연습"}{soloProv?` — ${soloProv.name}`:""}</span>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:13,color:"#475569",fontWeight:700}}>⏱ {fmtTime(elapsed)}</span>
              <button onClick={()=>setBgmOn(v=>!v)} style={{...S.ghost,fontSize:12,padding:"2px 8px"}}>{bgmOn?"🔊":"🔇"}</button>
            </div>
          </div>
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:4}}>
            <div style={{padding:"5px 14px",background:"#fff",borderRadius:10,border:`2px solid ${accent}`,fontWeight:700,fontSize:14,color:accent}}>
              {correct}/{total} 정복
            </div>
            <div style={{padding:"5px 14px",background:soloWrong>0?"#fef2f2":"#fff",borderRadius:10,border:`2px solid ${soloWrong>0?"#fca5a5":"#e2e8f0"}`,fontWeight:700,fontSize:14,color:soloWrong>0?"#dc2626":"#94a3b8"}}>
              ❌ {soloWrong}{isExam?`/${EXAM_FAIL}`:""}회
            </div>
          </div>
          <div style={{height:5,borderRadius:3,background:"#e2e8f0",overflow:"hidden",maxWidth:320,margin:"0 auto"}}>
            <div style={{height:"100%",borderRadius:3,background:accent,width:`${Math.round(correct/total*100)}%`,transition:"width .3s"}}/>
          </div>
        </div>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <MapBox accent={accent}>
            {isNation
              ?PROVINCES.map(p=>p.regions.map(r=>renderSolo(p.key,r)))
              :soloProv?.regions.map(r=>renderSolo(soloProv.key,r))
            }
          </MapBox>
        </div>
        <div style={{maxWidth:720,margin:"8px auto 0",textAlign:"center"}}>
          <button onClick={soloBack} style={S.ghost}>← 그만하기</button>
          <span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>빈 땅 탭 → 초성 확인 → 정답 입력!</span>
        </div>
        {sel&&(
          <AnswerModal onSubmit={soloSubmit} onClose={close} accent={accent}
            extraInfo={isExam&&(
              <div style={{fontSize:12,color:soloWrong>=EXAM_FAIL-3?"#dc2626":"#94a3b8",marginBottom:8,fontWeight:700}}>
                오답 {soloWrong}/{EXAM_FAIL} — {EXAM_FAIL-soloWrong}번 더 틀리면 불합격!
              </div>
            )}
          />
        )}
      </div>
    );
  }

  /* ── 팀전 게임 ── */
  if(phase==="game"){
    const myTeam=myTeamIdx!==null?teams[myTeamIdx]:null;
    const myWrongCount=roomData?.wrongCounts?.[myPid]||0;
    const isBlocked=myWrongCount>=TEAM_WRONG_LIMIT;
    const close=()=>{setSel(null);setSelProv(null);setMfb(null);};
    return(
      <div style={S.page}>
        <div style={{maxWidth:720,margin:"0 auto 6px"}}>
          {/* 방 코드 (재입장용) */}
          <div style={{textAlign:"center",fontSize:11,color:"#94a3b8",marginBottom:3}}>
            방 코드 <b style={{color:"#0f172a",letterSpacing:4,fontSize:13}}>{roomCode}</b>
            <button onClick={()=>setBgmOn(v=>!v)} style={{...S.ghost,fontSize:12,padding:"2px 6px",marginLeft:8}}>{bgmOn?"🔊":"🔇"}</button>
          </div>
          {/* 도 이름 */}
          <div style={{textAlign:"center",fontSize:16,fontWeight:700,marginBottom:4}}>
            {game.mode==="nation"?"🇰🇷 전국 한방":game.mode==="all"?`📍 ${prov?.name||""}`:prov?.name||""}
          </div>
          {/* 내 팀 + 오답 잠금 표시 */}
          {myTeam&&(
            <div style={{display:"flex",justifyContent:"center",gap:6,marginBottom:6,flexWrap:"wrap"}}>
              <div style={{background:myTeam.color,color:"#fff",fontWeight:700,fontSize:13,padding:"4px 16px",borderRadius:20}}>
                🏳️ 나는 {myTeam.name}
              </div>
              {myWrongCount>0&&(
                <div style={{background:isBlocked?"#dc2626":"#fef2f2",color:isBlocked?"#fff":"#dc2626",fontWeight:700,fontSize:12,padding:"4px 12px",borderRadius:20,border:`1px solid ${isBlocked?"#dc2626":"#fca5a5"}`}}>
                  {isBlocked?"🔒 잠금 (오답초과)":`❌ 오답 ${myWrongCount}/${TEAM_WRONG_LIMIT}`}
                </div>
              )}
            </div>
          )}
          {isBlocked&&(
            <div style={{textAlign:"center",fontSize:13,color:"#dc2626",background:"#fef2f2",border:"2px solid #fca5a5",borderRadius:10,padding:"6px 14px",marginBottom:6,fontWeight:700}}>
              🔒 오답 {TEAM_WRONG_LIMIT}회 초과 — 이번 게임 참여 불가
            </div>
          )}
          {/* 팀 점수 */}
          <div style={{display:"flex",gap:5,justifyContent:"center",flexWrap:"wrap"}}>
            {teams.map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",background:"#fff",borderRadius:10,border:`2px solid ${t.color}`,boxShadow:i===myTeamIdx?`0 0 0 2px ${t.color}`:"none"}}>
                <div style={{width:9,height:9,borderRadius:"50%",background:t.color}}/>
                <span style={{fontSize:12}}>{t.name}</span>
                <b style={{color:t.color,fontSize:15}}>{scores[i]||0}</b>
              </div>
            ))}
            <div style={{fontSize:11,color:"#64748b",background:"#fff",borderRadius:10,padding:"4px 9px",border:"2px solid #e2e8f0"}}>
              {game.mode==="nation"?`${totalOwned}/${TOTAL_REGIONS}`:`${provOwned}/${provTotal}`}
            </div>
          </div>
        </div>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <MapBox>
            {game.mode==="nation"
              ?PROVINCES.map(p=>p.regions.map(r=>renderTeam(p.key,r)))
              :prov?.regions.map(r=>renderTeam(prov.key,r))
            }
          </MapBox>
        </div>
        <div style={{maxWidth:720,margin:"8px auto 0",textAlign:"center"}}>
          <button onClick={leaveRoom} style={S.ghost}>← 나가기</button>
          <span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>빈 땅 탭해서 초성 맞추기!</span>
        </div>
        {sel&&(
          <AnswerModal onSubmit={submit} onClose={close}
            accent={myTeam?.color||"#0f172a"}
            extraInfo={myTeam&&(
              <div style={{fontSize:12,color:myTeam.color,fontWeight:700,marginBottom:6}}>
                🏳️ {myTeam.name}으로 제출
              </div>
            )}
          />
        )}
      </div>
    );
  }

  return null;
}

const F="'Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif";
const S={
  page:        {fontFamily:F,minHeight:"100vh",background:"linear-gradient(160deg,#eff6ff,#fefce8)",padding:"12px 10px",boxSizing:"border-box"},
  card:        {maxWidth:420,margin:"16px auto",background:"#fff",borderRadius:22,padding:"24px 20px",textAlign:"center",boxShadow:"0 20px 50px -12px rgba(0,0,0,.18)",border:"3px solid #bae6fd"},
  h1:          {fontSize:26,margin:"4px 0",color:"#0f172a"},
  h2:          {fontSize:20,margin:"0 0 14px",color:"#0f172a"},
  sub:         {fontSize:13,color:"#64748b",margin:"0 0 4px"},
  sectionLabel:{fontSize:11,color:"#94a3b8",marginBottom:8,fontWeight:700,letterSpacing:1},
  lbl:         {fontSize:12,color:"#94a3b8",textAlign:"left",marginBottom:5},
  inp:         {fontFamily:F,fontSize:16,padding:"10px 13px",borderRadius:12,border:"2px solid #e2e8f0",width:"100%",outline:"none"},
  btn:         {fontFamily:F,width:"100%",fontSize:15,padding:"13px",borderRadius:13,border:"none",cursor:"pointer",fontWeight:700,boxShadow:"0 4px 0 rgba(0,0,0,.1)"},
  ghost:       {fontFamily:F,fontSize:13,padding:"7px 14px",borderRadius:10,border:"2px solid #e2e8f0",background:"#fff",color:"#64748b",cursor:"pointer"},
  modeBtn:     {fontFamily:F,width:"100%",fontSize:14,padding:"9px",borderRadius:11,border:"2px solid #e2e8f0",background:"#fff",color:"#475569",cursor:"pointer"},
  modeBtnOn:   {background:"#0f172a",color:"#fff",borderColor:"#0f172a"},
  modeSmall:   {fontFamily:F,fontSize:12,padding:"6px 10px",borderRadius:9,border:"2px solid #e2e8f0",background:"#fff",color:"#475569",cursor:"pointer"},
  err:         {fontSize:12,color:"#ef4444",marginTop:8,padding:"7px",background:"#fef2f2",borderRadius:8},
  overlay:     {position:"fixed",inset:0,background:"rgba(15,23,42,.5)",display:"flex",alignItems:"center",justifyContent:"center",padding:16,zIndex:50},
  modal:       {background:"#fff",borderRadius:22,padding:"22px 20px",width:"min(380px,94vw)",textAlign:"center",boxShadow:"0 25px 60px rgba(0,0,0,.3)"},
  scoreRow:    {display:"flex",justifyContent:"space-between",padding:"8px 0"},
};

ReactDOM.createRoot(document.getElementById('root')).render(<LandGrab />);
</script>
</body>
</html>
