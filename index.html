<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>우리나라 땅따먹기 🗺️</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; user-select: none; }
    #boot {
      font-family: 'Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      background: linear-gradient(160deg,#eff6ff,#fefce8); color: #475569; text-align: center;
    }
    #boot .spin {
      width: 46px; height: 46px; border-radius: 50%;
      border: 5px solid #cbd5e1; border-top-color: #3b82f6;
      animation: bootspin 0.9s linear infinite;
    }
    @keyframes bootspin { to { transform: rotate(360deg); } }
    #boot .emoji { font-size: 46px; }
    #boot .msg { font-size: 15px; }
    #boot .err { display:none; font-size: 13px; color:#dc2626; max-width: 300px; line-height: 1.6; }
    #boot button {
      font-family: inherit; font-size: 14px; padding: 9px 18px; border-radius: 11px;
      border: none; background: #3b82f6; color: #fff; font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
<div id="root">
  <div id="boot">
    <div class="emoji">🗺️</div>
    <div class="spin" id="bootspin"></div>
    <div class="msg" id="bootmsg">게임을 불러오는 중...</div>
    <div class="err" id="booterr">
      게임을 불러오지 못했어요 😢<br>인터넷 연결을 확인하고 새로고침 해주세요.
      <br><br><button onclick="location.reload()">🔄 새로고침</button>
    </div>
  </div>
</div>

<script type="text/babel" data-presets="react" id="appcode">
const db = window.db;
const { useState, useEffect, useMemo, useRef } = React;

const MAP_BG = "./map.jpg";
const MAP_W = 1000, MAP_H = 1400;
const EXAM_FAIL_LIMIT = 15;

const PROVINCES = [
  {"key":"gangwon","name":"강원도","regions":[{"name":"철원","x":410,"y":183},{"name":"고성","x":564,"y":144},{"name":"속초","x":584,"y":198},{"name":"양양","x":599,"y":238},{"name":"강릉","x":639,"y":308},{"name":"동해","x":667,"y":358},{"name":"삼척","x":689,"y":410},{"name":"태백","x":656,"y":445},{"name":"인제","x":546,"y":236},{"name":"양구","x":502,"y":186},{"name":"화천","x":458,"y":201},{"name":"춘천","x":465,"y":260},{"name":"홍천","x":511,"y":296},{"name":"횡성","x":522,"y":347},{"name":"평창","x":571,"y":332},{"name":"정선","x":614,"y":386},{"name":"원주","x":486,"y":403},{"name":"영월","x":574,"y":426}]},
  {"key":"chungcheong","name":"충청도","regions":[{"name":"음성","x":438,"y":486},{"name":"충주","x":488,"y":473},{"name":"제천","x":529,"y":445},{"name":"단양","x":565,"y":471},{"name":"당진","x":305,"y":502},{"name":"천안","x":388,"y":520},{"name":"진천","x":418,"y":508},{"name":"태안","x":236,"y":531},{"name":"서산","x":271,"y":531},{"name":"아산","x":350,"y":524},{"name":"증평","x":447,"y":530},{"name":"괴산","x":483,"y":530},{"name":"홍성","x":295,"y":584},{"name":"예산","x":327,"y":559},{"name":"청주","x":429,"y":564},{"name":"청양","x":327,"y":616},{"name":"공주","x":364,"y":587},{"name":"보은","x":467,"y":599},{"name":"보령","x":292,"y":635},{"name":"부여","x":333,"y":659},{"name":"계룡","x":390,"y":653},{"name":"옥천","x":453,"y":641},{"name":"영동","x":481,"y":679},{"name":"서천","x":309,"y":694},{"name":"논산","x":380,"y":676},{"name":"금산","x":428,"y":689},{"name":"대전","x":416,"y":632},{"name":"세종","x":396,"y":596}]},
  {"key":"gyeongbuk","name":"경상북도","regions":[{"name":"봉화","x":643,"y":495},{"name":"영주","x":589,"y":508},{"name":"울진","x":709,"y":491},{"name":"울릉","x":938,"y":340},{"name":"문경","x":535,"y":546},{"name":"예천","x":574,"y":555},{"name":"영양","x":681,"y":545},{"name":"안동","x":633,"y":575},{"name":"상주","x":519,"y":613},{"name":"영덕","x":717,"y":600},{"name":"군위","x":609,"y":682},{"name":"의성","x":617,"y":635},{"name":"청송","x":674,"y":628},{"name":"구미","x":564,"y":672},{"name":"포항","x":730,"y":703},{"name":"김천","x":520,"y":694},{"name":"칠곡","x":579,"y":714},{"name":"영천","x":652,"y":707},{"name":"성주","x":546,"y":736},{"name":"경산","x":634,"y":765},{"name":"경주","x":700,"y":755},{"name":"고령","x":552,"y":783},{"name":"청도","x":624,"y":801},{"name":"대구","x":603,"y":742}]},
  {"key":"gyeongnam","name":"경상남도","regions":[{"name":"거창","x":494,"y":774},{"name":"합천","x":526,"y":824},{"name":"밀양","x":628,"y":839},{"name":"창녕","x":583,"y":827},{"name":"산청","x":494,"y":865},{"name":"함양","x":469,"y":814},{"name":"의령","x":554,"y":859},{"name":"양산","x":672,"y":853},{"name":"함안","x":571,"y":894},{"name":"김해","x":639,"y":885},{"name":"하동","x":474,"y":921},{"name":"진주","x":530,"y":906},{"name":"창원","x":601,"y":913},{"name":"사천","x":516,"y":946},{"name":"고성","x":556,"y":950},{"name":"통영","x":562,"y":998},{"name":"남해","x":504,"y":1009},{"name":"거제","x":607,"y":986},{"name":"울산","x":704,"y":816},{"name":"부산","x":684,"y":903}]},
  {"key":"jeonbuk","name":"전라북도","regions":[{"name":"군산","x":308,"y":736},{"name":"익산","x":352,"y":711},{"name":"완주","x":390,"y":720},{"name":"무주","x":462,"y":730},{"name":"김제","x":334,"y":767},{"name":"전주","x":374,"y":763},{"name":"진안","x":421,"y":749},{"name":"부안","x":301,"y":792},{"name":"정읍","x":336,"y":811},{"name":"임실","x":390,"y":815},{"name":"장수","x":438,"y":799},{"name":"순창","x":374,"y":864},{"name":"고창","x":295,"y":853},{"name":"남원","x":418,"y":856}]},
  {"key":"jeonnam","name":"전라남도","regions":[{"name":"영광","x":270,"y":895},{"name":"곡성","x":399,"y":905},{"name":"장성","x":317,"y":887},{"name":"담양","x":349,"y":886},{"name":"함평","x":277,"y":930},{"name":"구례","x":432,"y":903},{"name":"나주","x":311,"y":959},{"name":"화순","x":356,"y":953},{"name":"순천","x":414,"y":958},{"name":"무안","x":265,"y":974},{"name":"보성","x":379,"y":1003},{"name":"신안","x":210,"y":998},{"name":"목포","x":251,"y":1004},{"name":"영암","x":302,"y":1004},{"name":"장흥","x":340,"y":1014},{"name":"고흥","x":401,"y":1055},{"name":"광양","x":459,"y":958},{"name":"해남","x":287,"y":1063},{"name":"강진","x":319,"y":1044},{"name":"여수","x":457,"y":1013},{"name":"진도","x":234,"y":1090},{"name":"완도","x":322,"y":1121},{"name":"광주","x":327,"y":920}]},
  {"key":"jeju","name":"제주도","regions":[{"name":"제주","x":271,"y":1324},{"name":"서귀포","x":299,"y":1360}]}
];

const TEAM_COLORS = ["#ef4444","#3b82f6","#22c55e","#f59e0b","#a855f7","#ec4899"];
const TEAM_NAMES  = ["빨강팀","파랑팀","초록팀","노랑팀","보라팀","분홍팀"];
const SOLO_COLOR  = "#3b82f6";
const EXAM_COLOR  = "#7c3aed";

const CHO = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅆ","ㅇ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
function choseong(s){return[...s].map(ch=>{const c=ch.charCodeAt(0)-0xac00;return(c<0||c>11171)?ch:CHO[Math.floor(c/588)];}).join(" ");}
function normalize(s){return s.replace(/\s/g,"").replace(/(특별자치도|광역시|특별시|자치시|시|군|구)$/,"");}
const fbk=(prov,name)=>`${prov}__${name}`;
function fmtTime(ms){const s=Math.round(ms/1000);return`${Math.floor(s/60)}분 ${s%60}초`;}
const TOTAL_REGIONS=PROVINCES.reduce((a,p)=>a+p.regions.length,0);

function getMyPid(){
  let id=sessionStorage.getItem('ziri_pid');
  if(!id){id='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);sessionStorage.setItem('ziri_pid',id);}
  return id;
}
function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}

function LandGrab(){
  const myPid=useMemo(()=>getMyPid(),[]);

  /* ── 공통 상태 ── */
  const [phase,     setPhase]     = useState("home");
  const [error,     setError]     = useState("");
  const [bgmOn,     setBgmOn]     = useState(true);
  const [sel,       setSel]       = useState(null);
  const [selProv,   setSelProv]   = useState(null);
  const [inputAns,  setInputAns]  = useState("");
  const [mfb,       setMfb]       = useState(null);
  const [flash,     setFlash]     = useState(null);
  const inputRef=useRef(null);
  const actxRef =useRef(null);
  const bgmRef  =useRef(null);
  const bgmOnRef=useRef(true);
  useEffect(()=>{bgmOnRef.current=bgmOn;},[bgmOn]);

  /* ── 팀 멀티플레이어 상태 ── */
  const [roomCode,  setRoomCode]  = useState("");
  const [inputCode, setInputCode] = useState("");
  const [myName,    setMyName]    = useState(sessionStorage.getItem('ziri_name')||"");
  const [myTeamIdx, setMyTeamIdx] = useState(null);
  const [isHost,    setIsHost]    = useState(false);
  const [teamCount, setTeamCount] = useState(2);
  const [teamNames, setTeamNames] = useState([...TEAM_NAMES]);
  const [roomData,  setRoomData]  = useState(null);
  const [hostPlays, setHostPlays] = useState(false);   // 선생님도 팀에 참여할지
  const [showRank,  setShowRank]  = useState(false);   // 중간 순위 오버레이

  /* ── 1인용 상태 ── */
  const [soloType,    setSoloType]    = useState("practice"); // "practice" | "exam"
  const [soloMap,     setSoloMap]     = useState("nation");   // "nation" | provKey
  const [soloOwners,  setSoloOwners]  = useState({});         // {fbKey: true}
  const [soloWrong,   setSoloWrong]   = useState(0);
  const [soloStart,   setSoloStart]   = useState(null);
  const [soloEnd,     setSoloEnd]     = useState(null);
  const [soloFailed,  setSoloFailed]  = useState(false);
  const [soloNow,     setSoloNow]     = useState(null); // 실시간 타이머
  const timerRef=useRef(null);

  /* ── Firebase 리스너 (팀전용) ── */
  useEffect(()=>{
    if(!roomCode) return;
    const ref=db.ref(`rooms/${roomCode}`);
    ref.on('value',snap=>setRoomData(snap.val()));
    return()=>ref.off();
  },[roomCode]);

  const game    =roomData?.game    ||{};
  const players =roomData?.players ||{};
  const owners  =roomData?.owners  ||{};
  const teams   =game.teams||TEAM_NAMES.slice(0,2).map((n,i)=>({name:n,color:TEAM_COLORS[i]}));
  const scores  =useMemo(()=>{
    const s=Array(teams.length).fill(0);
    Object.values(owners).forEach(ti=>{if(ti>=0&&ti<s.length)s[ti]++;});
    return s;
  },[owners,teams]);
  const stats   =roomData?.stats||{};   // {pid:{name,teamIdx,wrong,lost}}

  /* ── 내 팀 자동 동기화 (대기실에서 팀을 안 눌러도 클릭이 되도록) ── */
  useEffect(()=>{
    const me=players[myPid];
    if(me&&me.teamIdx!=null&&myTeamIdx===null) setMyTeamIdx(me.teamIdx);
  },[roomData]);

  /* ── 팀전 게임 상태 전환 ── */
  useEffect(()=>{
    if(!roomData)return;
    const g=roomData.game||{};
    if(phase==="waiting"&&g.started)             {setPhase("game");startBgm();}
    if(phase==="game"   &&g.cleared)             {setPhase("result");stopBgm();}
    if(phase==="result" &&g.started&&!g.cleared) {setPhase("game");}
    if((phase==="game"||phase==="result")&&!g.started){setPhase("waiting");setSel(null);stopBgm();}
  },[roomData]);

  /* ── 통계 순위 (오답 많이 → 땅 많이 뺏긴 사람) ── */
  const lostRank=useMemo(()=>Object.entries(stats)
    .map(([pid,v])=>({pid,name:v.name||"?",teamIdx:v.teamIdx,wrong:v.wrong||0,lost:v.lost||0}))
    .filter(p=>p.wrong>0||p.lost>0)
    .sort((a,b)=>(b.lost-a.lost)||(b.wrong-a.wrong)),
  [stats]);

  /* ── 팀전 파생 ── */
  const prov=(game.started&&game.mode!=="nation"&&game.order?.length>0)?PROVINCES[game.order[game.provIdx||0]]:null;
  const provOwned =prov?prov.regions.filter(r=>owners[fbk(prov.key,r.name)]!==undefined).length:0;
  const provTotal =prov?prov.regions.length:0;
  const totalOwned=Object.keys(owners).length;

  /* ── 뷰박스 계산 ── */
  const activeProvKey = phase==="solo_game" ? soloMap : (game.mode&&game.mode!=="nation"?game.mode:null);
  const activeProv    = activeProvKey&&activeProvKey!=="nation"?PROVINCES.find(p=>p.key===activeProvKey):null;
  const viewBox=useMemo(()=>{
    if(!activeProv)return`0 0 ${MAP_W} ${MAP_H}`;
    const xs=activeProv.regions.map(r=>r.x),ys=activeProv.regions.map(r=>r.y);
    let minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
    const padX=(maxX-minX)*0.16+46,padY=(maxY-minY)*0.16+46;
    minX-=padX;maxX+=padX;minY-=padY;maxY+=padY;
    let w=maxX-minX,h=maxY-minY;
    if(w>h){const d=(w-h)/2;minY-=d;h=w;}else{const d=(h-w)/2;minX-=d;w=h;}
    return`${minX} ${minY} ${w} ${h}`;
  },[activeProv]);
  const vbScale=useMemo(()=>parseFloat(viewBox.split(" ")[2])/MAP_W,[viewBox]);
  const isNationMode=(phase==="solo_game"?soloMap==="nation":game.mode==="nation");
  const sz     =isNationMode?9:Math.max(13,Math.min(24,Math.round(40*vbScale)));
  const pillW  =sz*1.9,pillH=sz*1.3;

  /* ── 사운드 ── */
  function sound(ok){try{
    if(!actxRef.current)actxRef.current=new(window.AudioContext||window.webkitAudioContext)();
    const ac=actxRef.current;if(ac.state==="suspended")ac.resume();
    if(ok){[523,659,784].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type="triangle";o.frequency.value=f;o.connect(g);g.connect(ac.destination);const st=ac.currentTime+i*0.085;g.gain.setValueAtTime(0.0001,st);g.gain.exponentialRampToValueAtTime(0.5,st+0.02);g.gain.exponentialRampToValueAtTime(0.0001,st+0.26);o.start(st);o.stop(st+0.28);});}
    else{const o=ac.createOscillator(),g=ac.createGain();o.type="sawtooth";o.frequency.value=140;o.connect(g);g.connect(ac.destination);const st=ac.currentTime;g.gain.setValueAtTime(0.0001,st);g.gain.exponentialRampToValueAtTime(0.3,st+0.02);g.gain.exponentialRampToValueAtTime(0.0001,st+0.28);o.start(st);o.stop(st+0.3);}
  }catch(e){}}
  const MELODY=[523,659,784,659,587,784,988,784,659,784,1047,784,587,659,784,880];
  const BASS  =[131,0,196,0,165,0,196,0,131,0,196,0,165,0,98,0];
  function startBgm(){try{
    if(!actxRef.current)actxRef.current=new(window.AudioContext||window.webkitAudioContext)();
    const ac=actxRef.current;if(ac.state==="suspended")ac.resume();
    if(bgmRef.current)return;let step=0;
    bgmRef.current=setInterval(()=>{if(!bgmOnRef.current)return;
      const m=MELODY[step%MELODY.length],b=BASS[step%BASS.length],t=ac.currentTime;
      if(m){const o=ac.createOscillator(),g=ac.createGain();o.type="square";o.frequency.value=m;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.05,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.14);o.start(t);o.stop(t+0.16);}
      if(b){const o=ac.createOscillator(),g=ac.createGain();o.type="triangle";o.frequency.value=b;o.connect(g);g.connect(ac.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.07,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.2);o.start(t);o.stop(t+0.22);}
      step++;},175);
  }catch(e){}}
  function stopBgm(){if(bgmRef.current){clearInterval(bgmRef.current);bgmRef.current=null;}}

  /* ── 1인용: 시작/종료 ── */
  function soloStartGame(){
    setSoloOwners({});setSoloWrong(0);setSoloFailed(false);
    const now=Date.now();setSoloStart(now);setSoloEnd(null);setSoloNow(now);
    setSel(null);setSelProv(null);setInputAns("");setMfb(null);
    setPhase("solo_game");startBgm();
    timerRef.current=setInterval(()=>setSoloNow(Date.now()),1000);
  }
  function soloFinish(failed=false){
    const end=Date.now();setSoloEnd(end);setSoloFailed(failed);
    clearInterval(timerRef.current);
    setSel(null);setSelProv(null);setMfb(null);
    setPhase("solo_result");stopBgm();
  }
  function soloBack(){
    clearInterval(timerRef.current);stopBgm();
    setSel(null);setSelProv(null);setMfb(null);
    setPhase("solo_setup");
  }

  /* ── 1인용: 클릭 ── */
  function soloPickRegion(provKey,name){
    if(soloOwners[fbk(provKey,name)])return;
    setSel(name);setSelProv(provKey);setInputAns("");setMfb(null);
  }

  /* ── 1인용: 제출 ── */
  function soloSubmit(){
    if(!sel)return;
    if(normalize(inputAns)===normalize(sel)){
      sound(true);
      const key=fbk(selProv,sel);
      const newOwners={...soloOwners,[key]:true};
      setSoloOwners(newOwners);
      setFlash({name:sel,provKey:selProv});
      setTimeout(()=>setFlash(null),700);
      const owned=Object.keys(newOwners).length;
      let done=false;
      if(soloMap==="nation"&&owned>=TOTAL_REGIONS)done=true;
      else if(soloMap!=="nation"){
        const provData=PROVINCES.find(p=>p.key===soloMap);
        if(owned>=provData.regions.length)done=true;
      }
      setSel(null);setSelProv(null);setInputAns("");setMfb(null);
      if(done)soloFinish(false);
    } else {
      sound(false);
      const newWrong=soloWrong+1;
      setSoloWrong(newWrong);
      if(soloType==="exam"){
        // 시험: 땅 잃기
        const mine=Object.keys(soloOwners);
        let lostName=null,lostProv=null;
        if(mine.length){
          const lostKey=mine[Math.floor(Math.random()*mine.length)];
          const newOwners={...soloOwners};delete newOwners[lostKey];setSoloOwners(newOwners);
          const parts=lostKey.split('__');lostProv=parts[0];lostName=parts[1];
          setFlash({name:lostName,provKey:lostProv,lost:true});setTimeout(()=>setFlash(null),900);
        }
        if(newWrong>=EXAM_FAIL_LIMIT){soloFinish(true);return;}
        setMfb({msg:`땡! (${newWrong}/${EXAM_FAIL_LIMIT}회 오답)${lostName?` "${lostName}" 땅을 잃었어요!`:""}`});
      } else {
        // 연습: 패널티 없음, 다시 도전
        setMfb({msg:"땡! 다시 도전해봐요 🔄"});
      }
    }
  }

  /* ── 팀전: 방 관련 ── */
  async function createRoom(){
    if(!myName.trim()){setError("이름을 입력해주세요");return;}
    sessionStorage.setItem('ziri_name',myName);
    const code=genCode();
    const builtTeams=Array.from({length:teamCount},(_,i)=>({name:teamNames[i]||TEAM_NAMES[i],color:TEAM_COLORS[i]}));
    const roomObj={
      game:{mode:"nation",started:false,provIdx:0,order:[],cleared:false,hostId:myPid,teams:builtTeams,hostPlays},
      players:{}
    };
    if(hostPlays) roomObj.players[myPid]={name:myName.trim(),teamIdx:0,joinedAt:Date.now()};
    await db.ref(`rooms/${code}`).set(roomObj);
    if(hostPlays){
      db.ref(`rooms/${code}/players/${myPid}`).onDisconnect().remove();
      setMyTeamIdx(0);
    } else {
      setMyTeamIdx(null);   // 심판(미참여)
    }
    setRoomCode(code);setIsHost(true);setPhase("waiting");setError("");
  }
  async function joinRoom(){
    const code=inputCode.trim().toUpperCase();
    if(!code||code.length<4){setError("방 코드를 입력해주세요");return;}
    if(!myName.trim()){setError("이름을 입력해주세요");return;}
    const snap=await db.ref(`rooms/${code}/game`).get();
    if(!snap.exists()){setError("존재하지 않는 방 코드예요");return;}
    if(snap.val().started){setError("이미 시작된 게임이에요");return;}
    sessionStorage.setItem('ziri_name',myName);
    await db.ref(`rooms/${code}/players/${myPid}`).set({name:myName.trim(),teamIdx:0,joinedAt:Date.now()});
    db.ref(`rooms/${code}/players/${myPid}`).onDisconnect().remove();
    setMyTeamIdx(0);
    setRoomCode(code);setIsHost(false);setPhase("waiting");setError("");
  }
  async function changeTeam(ti){
    setMyTeamIdx(ti);
    await db.ref(`rooms/${roomCode}/players/${myPid}/teamIdx`).set(ti);
  }
  async function startGame(){
    if(!isHost)return;
    const mode=game.mode||"nation";
    let order=[];
    if(mode==="all")order=PROVINCES.map((_,i)=>i);
    else if(mode!=="nation")order=[PROVINCES.findIndex(p=>p.key===mode)];
    await db.ref(`rooms/${roomCode}/owners`).remove();
    await db.ref(`rooms/${roomCode}/stats`).remove();
    await db.ref(`rooms/${roomCode}/game`).update({started:true,order,provIdx:0,cleared:false});
  }
  /* ── 호스트: 지금 바로 종료 → 최종 순위 ── */
  async function endGameNow(){
    if(!isHost)return;
    await db.ref(`rooms/${roomCode}/game`).update({cleared:"END"});
  }
  async function setGameMode(m){if(!isHost)return;await db.ref(`rooms/${roomCode}/game/mode`).set(m);}
  function leaveRoom(){
    db.ref(`rooms/${roomCode}/players/${myPid}`).remove();
    setPhase("home");setRoomCode("");setRoomData(null);setIsHost(false);stopBgm();setSel(null);setMyTeamIdx(null);
  }
  async function resetToLobby(){
    if(!isHost)return;
    await db.ref(`rooms/${roomCode}/owners`).remove();
    await db.ref(`rooms/${roomCode}/stats`).remove();
    await db.ref(`rooms/${roomCode}/game`).update({started:false,cleared:false,provIdx:0});
  }

  /* ── 팀전: 클릭/제출 ── */
  function pick(provKey,name){
    if(myTeamIdx===null)return;
    if(owners[fbk(provKey,name)]!==undefined)return;
    setSel(name);setSelProv(provKey);setInputAns("");setMfb(null);
  }
  async function submit(){
    if(!sel||myTeamIdx===null)return;
    if(normalize(inputAns)===normalize(sel)){
      const key=fbk(selProv,sel);
      const ref=db.ref(`rooms/${roomCode}/owners/${key}`);
      const res=await ref.transaction(cur=>cur!=null?undefined:myTeamIdx);
      if(res.committed){
        sound(true);setFlash({name:sel,provKey:selProv,ti:myTeamIdx});setTimeout(()=>setFlash(null),700);
        const newTotal=Object.keys(owners).length+1;
        if(game.mode==="nation"&&newTotal>=TOTAL_REGIONS){await db.ref(`rooms/${roomCode}/game`).update({cleared:"END"});}
        else if(prov){const np=prov.regions.filter(r=>owners[fbk(prov.key,r.name)]!==undefined||(r.name===sel&&selProv===prov.key)).length;if(np>=provTotal)await db.ref(`rooms/${roomCode}/game`).update({cleared:true});}
      } else {sound(false);setMfb({msg:"아깝! 다른 팀이 먼저 차지했어요!"});return;}
      setSel(null);setSelProv(null);setInputAns("");setMfb(null);
    } else {
      sound(false);
      const mine=Object.keys(owners).filter(k=>owners[k]===myTeamIdx);
      let lostKey=null;
      if(mine.length){lostKey=mine[Math.floor(Math.random()*mine.length)];await db.ref(`rooms/${roomCode}/owners/${lostKey}`).remove();}
      const parts=lostKey?.split('__');const lostName=parts?.[1]||null,lostProvKey=parts?.[0]||null;
      // 통계 기록: 오답 +1, 땅을 실제로 잃었으면 lost +1
      const didLose=!!lostKey;
      db.ref(`rooms/${roomCode}/stats/${myPid}`).transaction(s=>{
        s=s||{wrong:0,lost:0};
        s.wrong=(s.wrong||0)+1;
        if(didLose) s.lost=(s.lost||0)+1;
        s.name=myName.trim()||players[myPid]?.name||"?";
        s.teamIdx=myTeamIdx;
        return s;
      });
      setMfb({msg:lostName?`땡! "${lostName}" 땅을 잃었어요!`:"땡! 다시 도전!"});
      if(lostName){setFlash({name:lostName,provKey:lostProvKey,ti:myTeamIdx,lost:true});setTimeout(()=>setFlash(null),900);}
    }
  }
  async function nextProv(){
    if(!isHost)return;
    const nextIdx=(game.provIdx||0)+1;
    if(nextIdx>=(game.order||[]).length)await db.ref(`rooms/${roomCode}/game`).update({cleared:"END"});
    else await db.ref(`rooms/${roomCode}/game`).update({cleared:false,provIdx:nextIdx});
  }

  /* ── 순위 패널 (팀 누적 점수 + 가장 많이 뺏긴 사람) ── */
  const rankPanel=()=>{
    const medal=["🥇","🥈","🥉"];
    const sorted=teams.map((t,i)=>({t,i,score:scores[i]||0})).sort((a,b)=>b.score-a.score);
    return(
      <div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
          {sorted.map(({t,i,score},rank)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",background:t.color+"22",borderRadius:12,border:`2px solid ${t.color}44`,outline:i===myTeamIdx?`3px solid ${t.color}`:"none"}}>
              <span style={{fontWeight:800,color:t.color}}>{medal[rank]||`${rank+1}.`} {t.name}{i===myTeamIdx?" (내 팀)":""}</span>
              <span style={{fontWeight:800,fontSize:18}}>{score}칸</span>
            </div>
          ))}
        </div>
        {lostRank.length>0&&(
          <div style={{background:"#fff7ed",borderRadius:12,padding:"12px 14px",border:"2px solid #fed7aa",textAlign:"left"}}>
            <div style={{fontWeight:800,color:"#c2410c",fontSize:13,marginBottom:8}}>😵 땅을 가장 많이 뺏긴 사람</div>
            {lostRank.slice(0,3).map((p,idx)=>{
              const tc=teams[p.teamIdx]?.color||"#94a3b8";
              return(
                <div key={p.pid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:13,padding:"4px 0"}}>
                  <span><b style={{color:tc}}>●</b> {idx+1}. {p.name} <span style={{color:"#94a3b8"}}>({teams[p.teamIdx]?.name||"?"})</span></span>
                  <span style={{color:"#475569"}}>뺏김 <b style={{color:"#dc2626"}}>{p.lost}</b> · 오답 {p.wrong}</span>
                </div>
              );
            })}
          </div>
        )}
      </div>
    );
  };

  /* ── 렌더링: 지역 (팀전) ── */
  const renderTeamRegion=(provKey,r)=>{
    const key=fbk(provKey,r.name);
    const ti=owners[key];const owned=ti!==undefined;
    const color=owned?(teams[ti]?.color||"#94a3b8"):"#cbd5e1";
    const isF=flash&&flash.name===r.name&&flash.provKey===provKey;
    const isSel=sel===r.name&&selProv===provKey;
    return(
      <g key={key} onClick={()=>pick(provKey,r.name)} style={{cursor:owned?"default":"pointer"}}>
        {owned&&<circle cx={r.x} cy={r.y} r={isF?sz*1.7:sz*1.25} fill={color} opacity={isF?0.8:0.45} style={{transition:"all .3s"}}/>}
        {isF&&flash.lost&&<circle cx={r.x} cy={r.y} r={sz*1.5} fill="none" stroke="#dc2626" strokeWidth={sz*0.18}/>}
        <rect x={r.x-pillW/2} y={r.y-pillH/2} width={pillW} height={pillH} rx={pillH/2}
          fill={owned?color:"#fff"} stroke={isSel?"#0f172a":(owned?color:"#cbd5e1")}
          strokeWidth={isSel?sz*0.22:sz*0.13} opacity={owned?1:0.95}/>
        <text x={r.x} y={r.y+sz*0.34} textAnchor="middle" fontSize={owned?sz*0.82:sz} fontWeight="700"
          fill={owned?"#fff":"#475569"} style={{fontFamily:"'Jua',sans-serif",letterSpacing:owned?0:1}}>
          {owned?r.name:choseong(r.name)}
        </text>
      </g>
    );
  };

  /* ── 렌더링: 지역 (1인용) ── */
  const renderSoloRegion=(provKey,r)=>{
    const key=fbk(provKey,r.name);
    const owned=!!soloOwners[key];
    const color=soloType==="exam"?EXAM_COLOR:SOLO_COLOR;
    const isF=flash&&flash.name===r.name&&flash.provKey===provKey;
    const isSel=sel===r.name&&selProv===provKey;
    return(
      <g key={key} onClick={()=>soloPickRegion(provKey,r.name)} style={{cursor:owned?"default":"pointer"}}>
        {owned&&<circle cx={r.x} cy={r.y} r={isF?sz*1.7:sz*1.25} fill={color} opacity={isF?0.8:0.45} style={{transition:"all .3s"}}/>}
        {isF&&flash.lost&&<circle cx={r.x} cy={r.y} r={sz*1.5} fill="none" stroke="#dc2626" strokeWidth={sz*0.18}/>}
        <rect x={r.x-pillW/2} y={r.y-pillH/2} width={pillW} height={pillH} rx={pillH/2}
          fill={owned?color:"#fff"} stroke={isSel?"#0f172a":(owned?color:"#cbd5e1")}
          strokeWidth={isSel?sz*0.22:sz*0.13} opacity={owned?1:0.95}/>
        <text x={r.x} y={r.y+sz*0.34} textAnchor="middle" fontSize={owned?sz*0.82:sz} fontWeight="700"
          fill={owned?"#fff":"#475569"} style={{fontFamily:"'Jua',sans-serif",letterSpacing:owned?0:1}}>
          {owned?r.name:choseong(r.name)}
        </text>
      </g>
    );
  };

  /* ─────────────────────────────────
     화면 렌더링
  ───────────────────────────────── */

  /* ── 홈 ── */
  if(phase==="home") return(
    <div style={S.page}><div style={S.card}>
      <div style={{fontSize:52}}>🗺️</div>
      <h1 style={S.h1}>우리나라 땅따먹기</h1>
      <p style={S.sub}>초성 보고 지역 이름 맞추기!</p>

      <div style={{borderBottom:"2px solid #f1f5f9",margin:"16px 0 14px",paddingBottom:14}}>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:8,fontWeight:700,letterSpacing:1}}>👥 팀 대결</div>
        <button onClick={()=>setPhase("creating")} style={{...S.btn,background:"#0f172a",color:"#fff",marginBottom:8}}>🏠 방 만들기 (선생님)</button>
        <button onClick={()=>setPhase("joining")}  style={{...S.btn,background:"#3b82f6",color:"#fff"}}>🚪 방 참여하기 (학생)</button>
      </div>

      <div>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:8,fontWeight:700,letterSpacing:1}}>🧑 1인용</div>
        <button onClick={()=>{setSoloType("exam");    setPhase("solo_setup");}}
          style={{...S.btn,background:EXAM_COLOR,color:"#fff",marginBottom:8}}>📝 시험 모드</button>
        <button onClick={()=>{setSoloType("practice");setPhase("solo_setup");}}
          style={{...S.btn,background:"#0891b2",color:"#fff"}}>🎮 혼자 연습</button>
      </div>
    </div></div>
  );

  /* ── 방 만들기 ── */
  if(phase==="creating") return(
    <div style={S.page}><div style={S.card}>
      <h2 style={S.h2}>🏠 방 만들기</h2>
      <div style={S.lbl}>선생님 이름</div>
      <input value={myName} onChange={e=>setMyName(e.target.value)} placeholder="이름 입력" style={S.inp} maxLength={8}/>
      <div style={{...S.lbl,marginTop:16}}>팀 수</div>
      <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:4}}>
        {[2,3,4].map(n=>(
          <button key={n} onClick={()=>setTeamCount(n)}
            style={{...S.btn,width:"auto",padding:"10px 20px",background:teamCount===n?"#0f172a":"#fff",color:teamCount===n?"#fff":"#475569",border:"2px solid #e2e8f0",boxShadow:"none"}}>
            {n}팀
          </button>
        ))}
      </div>
      <div style={{...S.lbl,marginTop:14}}>팀 이름 수정 (선택)</div>
      {Array.from({length:teamCount}).map((_,i)=>(
        <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
          <div style={{width:14,height:14,borderRadius:"50%",background:TEAM_COLORS[i],flexShrink:0}}/>
          <input value={teamNames[i]} onChange={e=>{const v=e.target.value;setTeamNames(ns=>ns.map((x,k)=>k===i?v:x));}}
            style={{...S.inp,flex:1}} maxLength={8}/>
        </div>
      ))}
      <div style={{...S.lbl,marginTop:16}}>선생님도 게임에 참여하나요?</div>
      <div style={{display:"flex",gap:8,marginTop:4}}>
        <button onClick={()=>setHostPlays(false)}
          style={{...S.btn,flex:1,boxShadow:"none",border:`2px solid ${!hostPlays?"#0f172a":"#e2e8f0"}`,background:!hostPlays?"#0f172a":"#fff",color:!hostPlays?"#fff":"#475569"}}>
          🙅 참여 안 함 (심판)
        </button>
        <button onClick={()=>setHostPlays(true)}
          style={{...S.btn,flex:1,boxShadow:"none",border:`2px solid ${hostPlays?"#0f172a":"#e2e8f0"}`,background:hostPlays?"#0f172a":"#fff",color:hostPlays?"#fff":"#475569"}}>
          🙋 참여 함
        </button>
      </div>
      <div style={{fontSize:11,color:"#94a3b8",marginTop:6,textAlign:"left"}}>
        {hostPlays?"선생님도 한 팀에 들어가 같이 땅을 차지해요.":"선생님은 게임을 진행·관리만 하고 팀에는 들어가지 않아요."}
      </div>
      {error&&<div style={S.err}>{error}</div>}
      <button onClick={createRoom} style={{...S.btn,background:"#0f172a",color:"#fff",marginTop:20}}>방 만들기 →</button>
      <button onClick={()=>{setPhase("home");setError("");}} style={{...S.ghost,marginTop:10,width:"100%"}}>← 돌아가기</button>
    </div></div>
  );

  /* ── 방 참여 ── */
  if(phase==="joining") return(
    <div style={S.page}><div style={S.card}>
      <h2 style={S.h2}>🚪 방 참여하기</h2>
      <div style={S.lbl}>방 코드</div>
      <input value={inputCode} onChange={e=>setInputCode(e.target.value.toUpperCase())}
        placeholder="XXXXXX" style={{...S.inp,textAlign:"center",fontSize:24,letterSpacing:5}} maxLength={6}/>
      <div style={{...S.lbl,marginTop:14}}>내 이름</div>
      <input value={myName} onChange={e=>setMyName(e.target.value)} placeholder="이름 입력" style={S.inp} maxLength={8}/>
      {error&&<div style={S.err}>{error}</div>}
      <button onClick={joinRoom} style={{...S.btn,background:"#3b82f6",color:"#fff",marginTop:20}}>다음 →</button>
      <button onClick={()=>{setPhase("home");setError("");}} style={{...S.ghost,marginTop:10,width:"100%"}}>← 돌아가기</button>
    </div></div>
  );

  /* ── 대기실 ── */
  if(phase==="waiting"){
    const playerList=Object.entries(players).sort((a,b)=>a[1].joinedAt-b[1].joinedAt);
    const myP=players[myPid];
    const currentTeamIdx=myP?.teamIdx??myTeamIdx??0;
    return(
      <div style={S.page}><div style={S.card}>
        <div style={{fontSize:34}}>{isHost?"🏠 방장":"⏳ 대기 중"}</div>
        <div style={{fontSize:12,color:"#94a3b8",margin:"4px 0 2px"}}>방 코드를 친구들에게 알려주세요</div>
        <div style={{fontSize:36,fontWeight:900,letterSpacing:8,background:"#f1f5f9",borderRadius:14,padding:"12px 20px",margin:"8px 0",color:"#0f172a"}}>{roomCode}</div>
        {(!isHost||game.hostPlays)?(<>
          <div style={S.lbl}>내 팀 선택</div>
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:12}}>
            {teams.map((t,i)=>(
              <button key={i} onClick={()=>changeTeam(i)}
                style={{fontFamily:"'Jua',sans-serif",padding:"10px 16px",borderRadius:12,border:`3px solid ${t.color}`,
                  background:currentTeamIdx===i?t.color:"#fff",color:currentTeamIdx===i?"#fff":t.color,fontWeight:700,fontSize:14,cursor:"pointer"}}>
                {t.name}
              </button>
            ))}
          </div>
        </>):(
          <div style={{fontSize:13,color:"#475569",padding:"10px",background:"#eef2ff",borderRadius:11,border:"2px solid #c7d2fe",marginBottom:12}}>
            🧑‍🏫 선생님은 <b>심판</b>이에요. 팀에는 들어가지 않고 게임만 진행해요.
          </div>
        )}
        <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",marginBottom:14}}>
          {teams.map((t,i)=>{
            const members=playerList.filter(([,p])=>p.teamIdx===i);
            return(
              <div key={i} style={{flex:"1 1 120px",minWidth:100,background:t.color+"18",border:`2px solid ${t.color}44`,borderRadius:12,padding:"8px 10px"}}>
                <div style={{fontWeight:800,color:t.color,fontSize:13,marginBottom:4}}>{t.name} ({members.length}명)</div>
                {members.map(([pid,p])=>(
                  <div key={pid} style={{fontSize:12,color:"#475569"}}>{p.name}{pid===myPid?" 👈":""}{pid===game.hostId?" 👑":""}</div>
                ))}
              </div>
            );
          })}
        </div>
        {isHost&&(<>
          <div style={S.lbl}>게임 모드</div>
          <button onClick={()=>setGameMode("nation")} style={{...S.modeBtn,...(game.mode==="nation"?S.modeBtnOn:{})}}>🇰🇷 전국 한방</button>
          <button onClick={()=>setGameMode("all")}    style={{...S.modeBtn,...(game.mode==="all"?S.modeBtnOn:{}),marginTop:4}}>📍 전국 순회</button>
          <div style={{display:"flex",gap:5,flexWrap:"wrap",justifyContent:"center",marginTop:5}}>
            {PROVINCES.map(p=><button key={p.key} onClick={()=>setGameMode(p.key)}
              style={{...S.modeSmall,...(game.mode===p.key?S.modeBtnOn:{})}}>{p.name}</button>)}
          </div>
          <button onClick={startGame} style={{...S.btn,background:"#22c55e",color:"#fff",fontSize:18,marginTop:14}}>🎮 게임 시작!</button>
        </>)}
        {!isHost&&<div style={{color:"#64748b",fontSize:13,padding:"10px",background:"#f8fafc",borderRadius:11,border:"2px solid #e2e8f0"}}>방장이 게임을 시작할 때까지 기다려요 ⏳</div>}
        <button onClick={leaveRoom} style={{...S.ghost,marginTop:10,width:"100%"}}>← 나가기</button>
      </div></div>
    );
  }

  /* ── 팀전 결과 ── */
  if(phase==="result"){
    const isEnd=game.cleared==="END";
    return(
      <div style={S.page}><div style={S.card}>
        <div style={{fontSize:48}}>{isEnd?"🏆":"🎉"}</div>
        <h2 style={{margin:"4px 0 2px",fontSize:22}}>{isEnd?"🏁 최종 순위":`${prov?.name||""} 클리어!`}</h2>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>지금까지 차지한 땅 누적 합계</div>
        {rankPanel()}
        {isHost&&!isEnd&&<button onClick={nextProv} style={{...S.btn,background:"#0f172a",color:"#fff",marginTop:6}}>{(game.provIdx||0)+1<(game.order||[]).length?`다음 지역 ▶`:"최종 결과 ▶"}</button>}
        {isHost&&!isEnd&&<button onClick={endGameNow} style={{...S.btn,background:"#dc2626",color:"#fff",marginTop:8}}>🏁 여기서 종료 (최종 순위)</button>}
        {isHost&&<button onClick={resetToLobby} style={{...S.btn,background:"#6366f1",color:"#fff",marginTop:8}}>🔄 처음부터 다시</button>}
        {!isHost&&!isEnd&&<div style={{color:"#64748b",fontSize:13,padding:"10px",background:"#f8fafc",borderRadius:11,border:"2px solid #e2e8f0",marginTop:8}}>방장이 다음을 선택 중이에요 ⏳</div>}
        <button onClick={leaveRoom} style={{...S.ghost,marginTop:10,width:"100%"}}>← 나가기</button>
      </div></div>
    );
  }

  /* ── 1인용 설정 ── */
  if(phase==="solo_setup"){

      <div style={S.page}><div style={S.card}>
        <div style={{fontSize:44}}>{isExam?"📝":"🎮"}</div>

        {isExam&&(
          <div style={{fontSize:12,color:"#dc2626",background:"#fef2f2",borderRadius:10,padding:"8px 12px",marginBottom:12,border:"1px solid #fecaca"}}>
            ⚠️ 오답 {EXAM_FAIL_LIMIT}회 이상이면 불합격!<br/>틀릴 때마다 내 땅 하나가 사라져요
          </div>
        )}
        {!isExam&&(
          <div style={{fontSize:12,color:"#0891b2",background:"#ecfeff",borderRadius:10,padding:"8px 12px",marginBottom:12,border:"1px solid #a5f3fc"}}>

          </div>
        )}
        <div style={S.lbl}>범위 선택 <span style={{color:accent}}>({regionCount}개 지역)</span></div>

        <button onClick={soloStartGame}
          style={{...S.btn,background:accent,color:"#fff",fontSize:18,marginTop:18}}>
          {isExam?"📝 시험 시작!":"🎮 연습 시작!"}
        </button>
        <button onClick={()=>setPhase("home")} style={{...S.ghost,marginTop:10,width:"100%"}}>← 돌아가기</button>
      </div></div>
    );
  }

  /* ── 1인용 결과 ── */
  if(phase==="solo_result"){
    const isExam=soloType==="exam";
    const accent=isExam?EXAM_COLOR:"#0891b2";

    const soloProv=soloMap!=="nation"?PROVINCES.find(p=>p.key===soloMap):null;

      <div style={S.page}><div style={S.card}>
        {isExam?(
          pass
            ?<div style={{fontSize:56}}>🎉</div>

        {!isExam&&<div style={{fontSize:22,fontWeight:900,margin:"4px 0 16px"}}>연습 완료!</div>}

        {/* 성적표 */}
        <div style={{background:"#f8fafc",borderRadius:14,padding:"16px",marginBottom:16,border:"2px solid #e2e8f0",textAlign:"left"}}>

            <span style={{color:"#64748b"}}>⏱ 소요 시간</span>
            <b>{fmtTime(elapsed)}</b>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #e2e8f0"}}>
            <span style={{color:"#64748b"}}>✅ 정답 (차지한 땅)</span>
            <b style={{color:"#22c55e"}}>{correct}개 / {total}개</b>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:isExam?"1px solid #e2e8f0":"none"}}>
            <span style={{color:"#64748b"}}>❌ 오답 횟수</span>
            <b style={{color:soloWrong>0?"#ef4444":"#22c55e"}}>{soloWrong}회</b>
          </div>
          {isExam&&(
            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0"}}>
              <span style={{color:"#64748b"}}>🚨 오답 한도</span>
              <b style={{color:soloWrong>=EXAM_FAIL_LIMIT?"#ef4444":"#64748b"}}>{soloWrong}/{EXAM_FAIL_LIMIT}회</b>
            </div>
          )}
        </div>

        {/* 비율 바 */}
        <div style={{height:14,borderRadius:7,background:"#e2e8f0",overflow:"hidden",marginBottom:16}}>
          <div style={{height:"100%",borderRadius:7,background:accent,width:`${Math.round(correct/total*100)}%`,transition:"width 1s"}}/>
        </div>
        <div style={{fontSize:12,color:"#94a3b8",marginBottom:16}}>{Math.round(correct/total*100)}% 정복</div>

        <button onClick={()=>setPhase("solo_setup")} style={{...S.ghost,width:"100%",marginBottom:6}}>⚙️ 설정 변경</button>
        <button onClick={()=>setPhase("home")} style={{...S.ghost,width:"100%"}}>🏠 홈으로</button>
      </div></div>
    );
  }

  /* ── 1인용 게임 ── */
  if(phase==="solo_game"){
    const isExam=soloType==="exam";
    const accent=isExam?EXAM_COLOR:"#0891b2";
    const soloProv=soloMap!=="nation"?PROVINCES.find(p=>p.key===soloMap):null;
    const total=soloProv?soloProv.regions.length:TOTAL_REGIONS;
    const correct=Object.keys(soloOwners).length;
    const selProvName=selProv?PROVINCES.find(p=>p.key===selProv)?.name:"";
    const elapsed=soloNow&&soloStart?soloNow-soloStart:0;

    return(
      <div style={S.page}>
        {/* HUD */}
        <div style={{maxWidth:720,margin:"0 auto 6px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6,marginBottom:6,padding:"0 2px"}}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:13,fontWeight:700,color:accent}}>{isExam?"📝 시험":"🎮 연습"}</span>
              {soloProv&&<span style={{fontSize:13,color:"#64748b"}}>{soloProv.name}</span>}
            </div>
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <span style={{fontSize:13,color:"#475569"}}>⏱ {fmtTime(elapsed)}</span>
              <button onClick={()=>setBgmOn(v=>!v)} style={{...S.ghost,fontSize:13,padding:"2px 8px"}}>{bgmOn?"🔊":"🔇"}</button>
            </div>
          </div>

          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>

              ❌ {soloWrong}회{isExam?`/${EXAM_FAIL_LIMIT}`:""}

              <image href={MAP_BG} xlinkHref={MAP_BG} x="0" y="0" width={MAP_W} height={MAP_H} preserveAspectRatio="none"/>
              {isNationMode
                ? PROVINCES.map(p=>p.regions.map(r=>renderSoloRegion(p.key,r)))
                : soloProv?.regions.map(r=>renderSoloRegion(soloProv.key,r))
              }
            </svg>
          </div>
        </div>

        <div style={{maxWidth:720,margin:"8px auto 0",textAlign:"center"}}>
          <button onClick={soloBack} style={S.ghost}>← 그만하기</button>
          <span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>빈 땅 탭 → 초성 맞추기!</span>
        </div>

        {/* 답변 모달 */}
        {sel&&(
          <div style={S.overlay} onClick={()=>{setSel(null);setSelProv(null);setMfb(null);}}>

              </div>

                {choseong(sel)}
              </div>
              {isExam&&(
                <div style={{fontSize:12,color:soloWrong>=EXAM_FAIL_LIMIT-3?"#dc2626":"#94a3b8",marginBottom:8}}>
                  오답 {soloWrong}/{EXAM_FAIL_LIMIT} — {EXAM_FAIL_LIMIT-soloWrong}번 더 틀리면 불합격!
                </div>
              )}
              <input ref={inputRef} autoFocus value={inputAns} placeholder="지역 이름 입력"
                onKeyDown={e=>{if(e.key==="Enter")soloSubmit();}}
                onChange={e=>{setInputAns(e.target.value);setMfb(null);}}
                style={{fontFamily:"'Jua',sans-serif",fontSize:20,padding:"11px 14px",borderRadius:13,border:"2px solid #e2e8f0",width:"100%",textAlign:"center",outline:"none"}}/>
              {mfb&&<div style={{fontSize:13,marginTop:8,fontWeight:700,color:"#dc2626"}}>{mfb.msg}</div>}
              <button onClick={soloSubmit}
                style={{fontFamily:"'Jua',sans-serif",marginTop:14,width:"100%",fontSize:17,padding:13,borderRadius:13,border:"none",background:accent,color:"#fff",fontWeight:700,cursor:"pointer",boxShadow:"0 4px 0 rgba(0,0,0,.18)"}}>
                정답 제출 🚩
              </button>
              <button onClick={()=>{setSel(null);setSelProv(null);setMfb(null);}}
                style={{fontFamily:"'Jua',sans-serif",marginTop:10,width:"100%",fontSize:14,padding:"9px",borderRadius:11,border:"2px solid #e2e8f0",background:"#fff",color:"#64748b",cursor:"pointer"}}>
                닫기
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  /* ── 팀전 게임 ── */
  if(phase==="game"){
    const myTeam=myTeamIdx!==null?teams[myTeamIdx]:null;
    const selProvName=selProv?PROVINCES.find(p=>p.key===selProv)?.name:"";
    return(
      <div style={S.page}>
        <div style={{maxWidth:720,margin:"0 auto 6px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:4}}>
            <div style={{fontSize:17,fontWeight:700}}>{game.mode==="nation"?"🇰🇷 전국 한방":prov?.name||""}</div>
            <button onClick={()=>setBgmOn(v=>!v)} style={{...S.ghost,fontSize:14,padding:"2px 8px"}}>{bgmOn?"🔊":"🔇"}</button>
          </div>
          {myTeam&&(
            <div style={{display:"flex",justifyContent:"center",marginBottom:5}}>
              <div style={{background:myTeam.color,color:"#fff",fontWeight:700,fontSize:14,padding:"5px 16px",borderRadius:20,boxShadow:"0 2px 0 rgba(0,0,0,.15)"}}>
                🏳️ 나는 {myTeam.name}
              </div>
            </div>
          )}
          {isHost&&!hostPlays&&myTeamIdx===null&&(
            <div style={{display:"flex",justifyContent:"center",marginBottom:5}}>
              <div style={{background:"#6366f1",color:"#fff",fontWeight:700,fontSize:13,padding:"5px 16px",borderRadius:20}}>
                🧑‍🏫 선생님(심판) — 진행만 해요
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap"}}>
            {teams.map((t,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",background:"#fff",borderRadius:10,border:`2px solid ${t.color}`,boxShadow:i===myTeamIdx?`0 0 0 2px ${t.color}`:"none"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:t.color}}/>
                <span style={{fontSize:13}}>{t.name}</span>
                <b style={{color:t.color,fontSize:16}}>{scores[i]||0}</b>
              </div>
            ))}
            <div style={{fontSize:12,color:"#64748b",background:"#fff",borderRadius:10,padding:"5px 10px",border:"2px solid #e2e8f0"}}>
              {game.mode==="nation"?`${totalOwned}/${TOTAL_REGIONS}`:`${provOwned}/${provTotal}`}
            </div>
          </div>
        </div>
        <div style={{maxWidth:720,margin:"0 auto"}}>
          <div style={{position:"relative",width:"100%",maxWidth:game.mode==="nation"?460:560,margin:"0 auto",
            aspectRatio:game.mode==="nation"?`${MAP_W}/${MAP_H}`:"1/1",
            borderRadius:16,overflow:"hidden",background:"#fff",
            border:"2px solid #e2e8f0",boxShadow:"0 8px 24px -8px rgba(0,0,0,.2)"}}>
            <svg viewBox={viewBox} preserveAspectRatio="xMidYMid meet"
              style={{position:"absolute",inset:0,width:"100%",height:"100%"}}>
              <image href={MAP_BG} xlinkHref={MAP_BG} x="0" y="0" width={MAP_W} height={MAP_H} preserveAspectRatio="none"/>
              {game.mode==="nation"
                ? PROVINCES.map(p=>p.regions.map(r=>renderTeamRegion(p.key,r)))
                : prov?.regions.map(r=>renderTeamRegion(prov.key,r))
              }
            </svg>
          </div>
        </div>
        <div style={{maxWidth:720,margin:"8px auto 0",textAlign:"center"}}>
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:6}}>
            <button onClick={()=>setShowRank(true)} style={{...S.ghost,fontWeight:700,color:"#0f172a"}}>📊 중간 순위 보기</button>
            {isHost&&<button onClick={endGameNow} style={{...S.ghost,fontWeight:700,color:"#dc2626",borderColor:"#fca5a5"}}>🏁 게임 종료</button>}
          </div>
          <button onClick={leaveRoom} style={S.ghost}>← 나가기</button>
          <span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>빈 땅 탭 → 초성 맞추기 → 내 팀 땅!</span>
        </div>
        {showRank&&(
          <div style={S.overlay} onClick={()=>setShowRank(false)}>
            <div style={{...S.modal,maxWidth:"min(420px,94vw)"}} onClick={e=>e.stopPropagation()}>
              <h2 style={{margin:"0 0 2px",fontSize:20}}>📊 중간 합산 순위</h2>
              <div style={{fontSize:12,color:"#94a3b8",marginBottom:14}}>지금까지 차지한 땅 누적 합계</div>
              {rankPanel()}
              <button onClick={()=>setShowRank(false)} style={{...S.btn,background:"#0f172a",color:"#fff",marginTop:6}}>닫기</button>
            </div>
          </div>
        )}
        {sel&&(
          <div style={S.overlay} onClick={()=>{setSel(null);setSelProv(null);setMfb(null);}}>
            <div style={S.modal} onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:13,color:"#94a3b8",marginBottom:4}}>{game.mode==="nation"?`${selProvName} · `:""}이 땅은?</div>
              <div style={{fontSize:46,fontWeight:900,letterSpacing:8,background:"#f8fafc",borderRadius:14,padding:"12px 0",margin:"0 0 12px"}}>{choseong(sel)}</div>
              <input ref={inputRef} autoFocus value={inputAns} placeholder="지역 이름 입력"
                onKeyDown={e=>{if(e.key==="Enter")submit();}}
                onChange={e=>{setInputAns(e.target.value);setMfb(null);}}
                style={{fontFamily:"'Jua',sans-serif",fontSize:20,padding:"11px 14px",borderRadius:13,border:"2px solid #e2e8f0",width:"100%",textAlign:"center",outline:"none"}}/>
              {mfb&&<div style={{fontSize:13,marginTop:8,fontWeight:700,color:"#dc2626"}}>{mfb.msg}</div>}
              {myTeam&&(
                <button onClick={submit}
                  style={{fontFamily:"'Jua',sans-serif",marginTop:14,width:"100%",fontSize:17,padding:13,borderRadius:13,border:"none",background:myTeam.color,color:"#fff",fontWeight:700,cursor:"pointer",boxShadow:"0 4px 0 rgba(0,0,0,.18)"}}>
                  {myTeam.name} 땅 차지! 🚩
                </button>
              )}
              <button onClick={()=>{setSel(null);setSelProv(null);setMfb(null);}}
                style={{fontFamily:"'Jua',sans-serif",marginTop:10,width:"100%",fontSize:14,padding:"9px",borderRadius:11,border:"2px solid #e2e8f0",background:"#fff",color:"#64748b",cursor:"pointer"}}>
                닫기
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
}

    var i=0;
    (function next(){
      if(i>=urls.length){ showError(); return; }
      var s=document.createElement('script');
      s.src=urls[i++];
      s.onload=function(){ done(); };
      s.onerror=function(){ next(); };
      document.head.appendChild(s);
    })();
  }

  function chain(steps, done){
    var i=0;
    (function next(){
      if(i>=steps.length){ done(); return; }
      loadOne(steps[i++], next);
    })();
  }
